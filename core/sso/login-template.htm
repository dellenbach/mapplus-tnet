<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="de" lang="{{language}}">

	<head>
		<title>{{page_title}}</title>

		<meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
		<link rel="stylesheet" href="{{css_path}}" />
		<!--link rel="stylesheet" href="{{overwrite_css_path}}" /-->

		<script type="text/javascript">
			function startgroup(){
				var s = document.getElementById("groupselect");
				var location=window.location.toString();
				var items = location.split('?');
				var newlocation = items[0];
				var separator = '?';
				if (items[1]){
					var args=items[1].split('&');
					for (var i=0;i<args.length;i++){
						vals=args[i].split('=');
						if (vals[0]!='group'){
							newlocation+=separator+vals[0]+'='+vals[1];
							separator='&';
						}
					}
				}
				newlocation+=separator+'group='+s.options[s.selectedIndex].value;
				window.location=newlocation;
			}
		</script>
	</head>

	<body>
		<form name="manualloginform" action="{{sso_uri}}/login.php" method="post">
			<div class="container">
				<div class="logo"></div>
				<div class="title">
						{{title}}
				</div>

				<div class="project" style="display:{{site_desc_visibility}};">
					{{site_desc}}
				</div>

				{{user_group_inputs}}

				<span class="row">
					<input class="button" type="{{submit_type}}" value="{{login}}" class="button" onclick="{{submit_fct}}" />
					<input class="button" type="button" value="{{logout}}" onclick='window.location="{{sso_uri}}/logout.php"' style="display:{{logout_visibility}};" />
				</span>
				<div class="message">
					{{error_msg}}
				</div>
			</div>
		</form>

	</body>

</html>
