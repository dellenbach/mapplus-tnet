name: TNET Tests

on:
  workflow_dispatch:
  push:
    paths:
      - 'maps/tnet/tests/**'
      - 'maps/tnet/php/**'
      - 'maps/tnet/api/**'
      - 'maps-dev/tnet/php/**'
      - 'maps-dev/tnet/api/**'
      - '_scripts/deployment/**'
      - '_scripts/_build_js.py'
      - 'docs/DEV_DEPLOY_WORKFLOW.md'
      - '.github/workflows/tnet-tests.yml'
  pull_request:
    paths:
      - 'maps/tnet/tests/**'
      - 'maps/tnet/php/**'
      - 'maps/tnet/api/**'
      - 'maps-dev/tnet/php/**'
      - 'maps-dev/tnet/api/**'
      - '_scripts/deployment/**'
      - '_scripts/_build_js.py'
      - 'docs/DEV_DEPLOY_WORKFLOW.md'
      - '.github/workflows/tnet-tests.yml'

jobs:
  tests-standard:
    name: Standard Tests
    runs-on: ubuntu-latest
    env:
      TNET_BASE_URL: https://www.gis-daten.ch/maps-dev/tnet/php

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r maps/tnet/tests/requirements-test.txt

      - name: Run pytest (standard)
        run: |
          mkdir -p test-results
          python -m pytest maps/tnet/tests --junitxml=test-results/junit.xml -q

      - name: Upload JUnit report (standard)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-standard
          path: test-results/junit.xml

  tests-external:
    name: External Tests
    runs-on: ubuntu-latest
    env:
      TNET_BASE_URL: https://www.gis-daten.ch/maps-dev/tnet/php
      TNET_RUN_EXTERNAL: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r maps/tnet/tests/requirements-test.txt

      - name: Run pytest (external enabled)
        run: |
          mkdir -p test-results
          python -m pytest maps/tnet/tests --junitxml=test-results/junit-external.xml -q

      - name: Upload JUnit report (external)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-external
          path: test-results/junit-external.xml
