        (function installInitialBookmarkOpGuard() {
            try {
                var params = new URLSearchParams(window.location.search || '');
                var initialOp = params.get('op') || '';
                var initialLayers = params.get('layers') || '';
                var initialLayerCount = initialLayers ? initialLayers.split('|').filter(function(id) { return !!id; }).length : 0;
                if (!initialOp || window.__tnetInitialBookmarkOpGuardInstalled) return;

                var historyApi = window.history;
                var guardUntil = Date.now() + 18000;
                var origReplace = historyApi && historyApi.replaceState;
                var origPush = historyApi && historyApi.pushState;
                if (typeof origReplace !== 'function') return;

                window.__tnetInitialBookmarkOpGuardInstalled = true;
                window.__tnetInitialBookmarkOpGuardEnabled = true;

                function normalize(url) {
                    if (url == null) return url;
                    try {
                        var absolute = new URL(String(url), window.location.href);
                        var nextParams = absolute.searchParams;
                        var nextLayers = nextParams.get('layers') || '';
                        var nextLayerCount = nextLayers ? nextLayers.split('|').filter(function(id) { return !!id; }).length : 0;
                        var opCount = initialOp.split('|').filter(function(value) { return value !== ''; }).length;

                        if (window.__tnetInitialBookmarkOpGuardEnabled && Date.now() < guardUntil) {
                            if (initialLayers && initialLayerCount) nextParams.set('layers', initialLayers);
                            if (initialOp && opCount === initialLayerCount) nextParams.set('op', initialOp);
                        }

                        return absolute.pathname + (nextParams.toString() ? ('?' + nextParams.toString()) : '') + absolute.hash;
                    } catch (eUrlGuard) {
                        return url;
                    }
                }

                historyApi.replaceState = function(state, title, url) {
                    var normalized = normalize(url);
                    if (normalized === window.location.pathname + window.location.search + window.location.hash) return;
                    return origReplace.call(this, state, title, normalized);
                };
                if (typeof origPush === 'function') {
                    historyApi.pushState = function(state, title, url) {
                        var normalized = normalize(url);
                        if (normalized === window.location.pathname + window.location.search + window.location.hash) return;
                        return origPush.call(this, state, title, normalized);
                    };
                }
            } catch (eInitOpGuard) { /* ignore */ }
        })();
    </script>

    (function prepareOriginalMapplusPrintModeBeforeInit() {
        function applyOriginalPrintToolMode() {
            var tool = window.njs && njs.config && njs.config.tools && njs.config.tools.main && njs.config.tools.main.PrintScaledMap;
            if (!tool) return false;

            tool.tool_button = true;

            tool.gridOption = true;
            tool.angleOption = true;
            tool.saveStateOption = true;
            tool.dialog_opts = { left: '22', top: '105', width: '400', height: '150' };
            return true;
        }

        if (window.__tnetDesiredPrintProvider === 'mapplus') {
            applyOriginalPrintToolMode();

            if (window.njs && njs.AppManager && typeof njs.AppManager.initApp === 'function' && !window.__tnetOriginalMapplusInitWrapped) {
                var originalInitApp = njs.AppManager.initApp;
                njs.AppManager.initApp = function () {

    <script>
    (function installEarlyMapplusPrintMode() {
        function detectPrintProvider() {
            try {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', 'tnet/config/tnet-global-config.json5?v=20260707a', false);
                xhr.send(null);
                if (xhr.status < 200 || xhr.status >= 300 || !xhr.responseText) return null;

                var text = String(xhr.responseText)
                    .replace(/\/\*[\s\S]*?\*\//g, '')
                    .replace(/(^|[^:])\/\/.*$/gm, '$1');
                var printMatch = text.match(/print\s*:\s*\{[\s\S]*?provider\s*:\s*['\"]([^'\"]+)['\"]/i);
                return printMatch ? String(printMatch[1]).toLowerCase() : null;
            } catch (e) {
                return null;
            }
        }

        window.__tnetDesiredPrintProvider = detectPrintProvider();
    })();
    </script>

    <!-- Early Splash-Hide: Startet sofort, wartet nicht auf ES Modules -->
    <script>
    (function() {
        var _t0 = Date.now();
        window.hideSplashScreen = function() {
            var splash = document.getElementById('splash-screen');
            var preloader = document.getElementById('preloader');
            if (preloader) preloader.style.display = 'none';
            var streetview = document.getElementById('streetviewContainer');
            if (streetview) streetview.style.display = 'none';
            if (splash) {
                splash.classList.add('hidden');
                setTimeout(function() { splash.remove(); }, 1000);
            }
        };
        function earlyCheckAppReady() {
            // Map-Objekt bereit = Dojo parser.parse() + initApp() abgeschlossen
            if (window.njs && njs.AppManager && njs.AppManager.Maps && njs.AppManager.Maps['main']) {
                hideSplashScreen();
                // Zentrales Event dispatchen — alle Module können darauf lauschen
                // statt eigene Polling-Loops zu betreiben
                if (!window._tnetAppReadyFired) {
                    window._tnetAppReadyFired = true;
                    document.dispatchEvent(new CustomEvent('tnet-app-ready', {
                        detail: { map: njs.AppManager.Maps['main'].mapObj }
                    }));
                    console.log('[App] tnet-app-ready Event dispatched');
                }
                return;
            }
            // Fallback: Maximal 8 Sekunden warten
            if (Date.now() - _t0 > 8000) {
                hideSplashScreen();
                return;
            }
            setTimeout(earlyCheckAppReady, 80);
        }
        earlyCheckAppReady();
    })();
    </script>
