openapi: 3.0.3
info:
  title: TNET API
  description: |
    REST API für MAP+ GIS Applikation der Trigonet AG.

    Liefert Layer-Kataloge, Hintergrundkarten und Bookmarks als JSON.  
    Designed für Split-Screen, Mobile und Desktop Clients.

    ## Gruppen / Profile

    Der `group`-Parameter wählt ein Profil (Unterordner unter maps/):
    - `public` (Standard) — Öffentlicher Zugang
    - `nwpro` — Nidwalden Professional
    - `owpro` — Obwalden Professional
    - `uwpro` — Unterwalden Professional
    - `marco` — Entwickler-Profil

    ## Kategorien

    Layer sind in 4 Hauptkategorien organisiert:
    - `nidwalden` — Kanton Nidwalden
    - `obwalden` — Kanton Obwalden
    - `bund` — Bund (Bundesebene)
    - `weitere` — Weitere Datenquellen

    ## Tools

    | Tool | URL | Beschreibung |
    |------|-----|--------------|
    | **Layer-Tree Vorschau** | [`/v1/tree-test.html`](https://www.gis-daten.ch/maps/tnet/api/v1/tree-test.html) | Interaktiver Layer-Tree zum Testen und Debuggen. Unterstützt `?group=` und `?category=` Parameter. |
    | **Dev-Testseite** | [`/v1/dev-test.html`](https://www.gis-daten.ch/maps/tnet/api/v1/dev-test.html) | Tree + Active Panel mit Mobile/Desktop/Split View, Drag & Drop, emulierte Layer. |
    | **Tree-Builder** | [`/v1/tree-builder.html`](https://www.gis-daten.ch/maps/tnet/api/v1/tree-builder.html) | Interaktiver Konfigurator: Layer → Gruppen → Tree per Drag & Drop, JSON5 Export. |
    | **Service- und Layermanager** | [`/v1/slm.html`](https://www.gis-daten.ch/maps/tnet/api/v1/slm.html) | Service-Konfigurationen importieren & verwalten. Multi-Import/-Delete. |
    | **Legend-Proxy** | [`/v1/legend-proxy.php`](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=ewn/EWN_NIS/MapServer) | Formatierte ArcGIS-Legenden mit konfigurierbarer Symbolgrösse (HTML/JSON). |
    | **Legend-Proxy WMS** | [`/v1/legend-proxy-wms.php`](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy-wms.php?service=/qmap/test/kulturobjekte_nw_pg&layer=Kulturobjekte%20Flaeche) | QMAP/WMS-GetLegendGraphic Proxy mit HTML/JSON und Metadata-Injection-Hook. |
    | **Tree-Builder API** | [`/v1/treebuilder-api.php`](https://www.gis-daten.ch/maps/tnet/api/v1/treebuilder-api.php) | Persistenz-Backend: State, Locks, Profile, Service-Import. |
    | **API Info** | [`/v1/info`](https://www.gis-daten.ch/maps/tnet/api/v1/info) | Health-Check, Endpoint-Übersicht, Server-Statistiken. |

  version: "1.0"
  contact:
    name: Trigonet AG
    url: https://www.gis-daten.ch
  license:
    name: Proprietary
    url: https://www.trigonet.ch

servers:
- url: /maps-dev/tnet/api
  description: DEV
- url: /maps/tnet/api
  description: Produktion

tags:
- name: Layers
  description: Layer-Katalog (Themen, Gruppen, Layer)
- name: Basemaps
  description: Hintergrundkarten
- name: Bookmarks
  description: Vorkonfigurierte Kartenansichten
- name: Cache
  description: Cache-Management
- name: Tree-Builder
  description: |
    Persistenz-API für den Tree-Builder (State, Locks, JSON5-Gruppen, Profile, Lyrmgr-Publish).
    Alle Aktionen laufen über `treebuilder-api.php?action=...`.
- name: Service- und Layermanager
  description: |
    Services → MapPlus Roh-Konfiguration.
    Importiert Config-Dateien von ArcGIS/WMS/WMTS-Diensten via `ags2mapplus`-API,
    speichert sie in `data/tmp/raw-conf/` und ermöglicht Verwaltung (Auflisten, Lesen, Löschen).
- name: Legends
  description: |
    ArcGIS Server Legenden-Proxy.
    Holt Legend-JSON via agsproxy.php (inkl. Token-Management),
    rendert kompaktes HTML mit eingebetteten Base64-Symbolen oder gibt JSON zurück.
- name: System
  description: API-Info und Health-Check
- name: Tools
  description: Interaktive Test- und Vorschau-Tools

paths:
  /v1/layers:
    get:
      tags: [ Layers ]
      summary: Layer-Katalog abrufen
      description: |
        Liefert den hierarchischen Layer-Katalog als JSON.  
        Unterstützt Filterung nach Kategorie, flache Ausgabe und Einzelabfrage.  
        Ergebnisse werden automatisch gecacht (1h, invalidiert bei Config-Änderung).

        **Performance-Tipps:**
        - `?details=false` für schnelles Laden (~570ms statt 3.7s)
        - `?id=xxx` für Einzelabfrage (~168ms)
        - Zweiter Aufruf dank Cache ~15ms
      parameters:
      - name: group
        in: query
        description: "Profil/Gruppe (default: public)"
        schema:
          type: string
          default: public
          enum: [ public, av, intranet, marco, nwpro, oereb, owpro, playground1, playground2, playground3, uwpro, wmi ]
      - name: category
        in: query
        description: Nur eine bestimmte Kategorie zurückgeben
        schema:
          type: string
          enum: [ nidwalden, obwalden, bund, weitere ]
      - name: flat
        in: query
        description: "Flache Liste statt Baumstruktur (true/false)"
        schema:
          type: string
          enum: [ "true", "false" ]
          default: "false"
      - name: details
        in: query
        description: "Layer-Details (url, params, options) laden. false = nur IDs+Namen, viel schneller."
        schema:
          type: string
          enum: [ "true", "false" ]
          default: "true"
      - name: id
        in: query
        description: "Einzelnen Layer per ID laden (schneller Lookup, ~168ms)"
        schema:
          type: string
        example: gis_basis/nw_basisplan_gis_dynamisch
      - name: debug
        in: query
        description: "Debug-Informationen einblenden, Cache überspringen (1/0)"
        schema:
          type: string
          enum: [ "1", "0" ]
          default: "0"
      - name: source
        in: query
        description: "Datenquelle: auto = DB bevorzugt mit File-Fallback, db = nur PostgreSQL, file = nur Config-Dateien"
        schema:
          type: string
          enum: [ auto, db, file ]
          default: auto
      responses:
        "200":
          description: Erfolgreiche Antwort
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LayerCatalogResponse"
              examples:
                tree:
                  summary: Hierarchische Antwort
                  value:
                    success: true
                    data:
                      version: "2.0"
                      categories:
                      - id: nidwalden
                        name: Nidwalden
                        icon: njsCategoryIcon8
                        subcategories:
                        - id: grundlagen
                          name: Grundlagen
                          groups:
                          - id: "grundlagen/av"
                            name: AV
                            layers:
                            - id: "TNET_gis_basis/nw_amtliche_vermessung"
                              name: Amtliche Vermessung
                              type: layer
                              layerType: arcgisRest
                    meta:
                      group: public
                      categoriesCount: 4
                      format: tree
        "404":
          description: Konfiguration nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Methode nicht erlaubt (nur GET)
        "500":
          description: Server-Fehler

  /v1/basemaps:
    get:
      tags: [ Basemaps ]
      summary: Hintergrundkarten abrufen
      description: Liefert die verfügbaren Basemaps aus basemaps.conf.
      responses:
        "200":
          description: Erfolgreiche Antwort
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasemapsResponse"
        "404":
          description: basemaps.conf nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/bookmarks:
    get:
      tags: [ Bookmarks ]
      summary: Bookmarks abrufen
      description: |
        ## Modi

        | Parameter | Modus | Antwort |
        |---|---|---|
        | _(kein name)_ | **Listenmodus** | Kompakte Liste aller Bookmarks (`id`, `name`, `aliases`, `basemapColorMode`) |
        | `name=<id>` | **Detailmodus** | Vollständige Bookmark-Konfiguration (layers, basemap, themes, views, …) |

        **Pflichtparameter:** `source=db` oder `source=file`

        ## Parameter-Kombinationen

        - `name=<id>` → Einzelner Bookmark (immer vollständig, `full` wird ignoriert)
        - _(kein name)_ → Kompakte Liste
        - _(kein name)_ + `full=1` → Liste mit vollständigen Objekten (bulk, für SLM/Editor)
        - `name=<id>` + `hierarchy=1` → Einzelner Bookmark **+ `serviceGroups[]`** (Layer nach Dienst aggregiert)
        - _(kein name)_ + `full=1` + `hierarchy=1` → Vollständige Liste inkl. `serviceGroups[]` pro Bookmark

        ## serviceGroups (hierarchy=1)

        Fasst alle Layer-IDs nach den ersten 2 Pfad-Segmenten zusammen:
        `gis_oereb/nw_kbs_def/belastete_standorte_flaechen` → Gruppe `gis_oereb/nw_kbs_def`.
        Eine Gruppe kann 1 (flat ID) oder mehrere IDs (Root + Sublayer) enthalten.
      parameters:
      - name: name
        in: query
        description: "ID des gesuchten Bookmarks (z. B. `nw_oereb`). Schaltet in den **Detailmodus** — liefert vollständige Konfiguration. Ohne diesen Parameter: Listenmodus."
        schema:
          type: string
        example: nw_oereb
      - name: source
        in: query
        required: true
        description: Datenquelle — `db` (Datenbank, Standard) oder `file` (JSON-Datei).
        schema:
          type: string
          enum: [ db, file ]
        example: db
      - name: hierarchy
        in: query
        description: |
          Erweitert die Antwort um `serviceGroups[]`:
          - `1` — **Flach**: jede Gruppe hat `svc` + `layerIds[]` + `opacity`
          - `2` — **Nested Tree**: jede Gruppe hat `svc` + `tree[]` + `opacity`. `tree[]` ist ein rekursiver Baum mit `id`, `visible`, `opacity`, `filter`, `children[]`
        schema:
          type: string
          enum: [ "1", "2" ]
        example: "1"
      - name: full
        in: query
        description: "Nur im **Listenmodus** (kein `name`): `full=1` liefert vollständige v2-Objekte statt kompakter id/name/aliases-Einträge. **Wird ignoriert wenn `name` angegeben ist** — der Detailmodus ist immer vollständig."
        schema:
          type: string
          enum: [ "1" ]
      - name: profile
        in: query
        description: |
          Profil-Filter (Kartengruppe). Wenn angegeben, werden die Layer des Bookmarks
          **serverseitig** auf die im Profil konfigurierten Layer gefiltert.
          Dienste/Gruppen ohne gültige Layer werden komplett weggelassen.
          Der Client braucht **keine eigene Validierungslogik** mehr.

          Verfügbare Profile: `public`, `nwpro`, `owpro`, `uwpro`, `marco`

          Empfohlene Kombination: `hierarchy=2&profile=<profil>`
        schema:
          type: string
          enum: [ public, nwpro, owpro, uwpro, marco ]
        example: nwpro
      - name: names
        in: query
        description: |
          Wenn `1`: ergänzt bei `hierarchy=2` serverseitig aufgelöste Namen (`name`) für
          Dienst-Gruppen und Tree-Knoten (aus Katalog/NLS), damit der Client keine
          eigene Label-Logik benötigt.
        schema:
          type: string
          enum: [ "1" ]
        example: "1"
      responses:
        "200":
          description: Erfolgreiche Antwort
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/BookmarkListResponse"
                - $ref: "#/components/schemas/BookmarkDetailResponse"
              examples:
                list:
                  summary: Liste aller Bookmarks (source=db)
                  value:
                    success: true
                    data:
                    - id: nw_nutzungsplanung
                      name: Nutzungsplanung NW
                      aliases: [ nw_np, nw_raumplanung ]
                      basemapColorMode: color
                    - id: nw_oereb
                      name: "ÖREB Nidwalden"
                      aliases: [ nw_oereb_test ]
                      basemapColorMode: grey
                    - id: ow_nutzungsplanung
                      name: Nutzungsplanung OW
                      aliases: []
                      basemapColorMode: color
                    meta:
                      count: 42
                      source: db
                      hierarchy: false
                      schemaVersion: 2
                detail:
                  summary: Einzelner Bookmark (source=db)
                  value:
                    success: true
                    data:
                      id: nw_oereb
                      meta:
                        schemaVersion: 2
                      name: "ÖREB Nidwalden"
                      aliases: [ nw_oereb_test ]
                      basemap: av_sw
                      basemapColorMode: grey
                      themes: "nw:oereb"
                      views:
                      - id: NPL
                        name: Nutzungsplanung
                        isDefault: false
                        layerStates:
                          gis_oereb/nw_nutzungsplanung_def/grundnutzung:
                            visible: true
                      layers:
                      - id: gis_oereb/nw_nutzungsplanung_def
                        visible: false
                        opacity: null
                        order: null
                        filter: null
                      - id: gis_oereb/nw_nutzungsplanung_def/grundnutzung
                        visible: false
                        opacity: null
                        order: null
                        filter: null
                      - id: gis_oereb/nw_nutzungsplanung_def/gefahrenzone
                        visible: true
                        opacity: null
                        order: null
                        filter: null
                detail_hierarchy:
                  summary: "hierarchy=1 — flat serviceGroups + layers[] (source=db)"
                  description: |
                    Jede Gruppe enthält `svc`, `layerIds[]` und `opacity`.
                    `layers[]` bleibt enthalten (flache Liste zur Referenz).
                  value:
                    success: true
                    data:
                      id: nw_oereb
                      meta:
                        schemaVersion: 2
                      name: "ÖREB Nidwalden"
                      aliases: [ nw_oereb_test ]
                      basemap: av_sw
                      basemapColorMode: grey
                      themes: "nw:oereb"
                      layers:
                      - id: gis_oereb/nw_nutzungsplanung_def
                        visible: false
                        opacity: null
                        order: null
                        filter: null
                      - id: gis_oereb/nw_nutzungsplanung_def/grundnutzung
                        visible: false
                        opacity: null
                        order: null
                        filter: null
                      - id: gis_oereb/nw_nutzungsplanung_def/gefahrenzone
                        visible: true
                        opacity: null
                        order: null
                        filter: null
                      - id: gis_oereb/nw_kbs_def
                        visible: false
                        opacity: null
                        order: null
                        filter: null
                      - id: ch.astra.baulinien-nationalstrassen
                        visible: false
                        opacity: null
                        order: null
                        filter: null
                      serviceGroups:
                      - svc: gis_oereb/nw_nutzungsplanung_def
                        layerIds:
                        - gis_oereb/nw_nutzungsplanung_def
                        - gis_oereb/nw_nutzungsplanung_def/grundnutzung
                        - gis_oereb/nw_nutzungsplanung_def/gefahrenzone
                        opacity: null
                      - svc: gis_oereb/nw_kbs_def
                        layerIds:
                        - gis_oereb/nw_kbs_def
                        opacity: null
                      - svc: ch.astra.baulinien-nationalstrassen
                        layerIds:
                        - ch.astra.baulinien-nationalstrassen
                        opacity: null
                detail_tree:
                  summary: "hierarchy=2 — nested tree, KEIN layers[] (source=db)"
                  description: |
                    `layers[]` wird weggelassen — alle Infos stecken im `tree[]`.
                    Client traversiert nur `serviceGroups[].tree[]` rekursiv, keine eigene Logik nötig.
                  value:
                    success: true
                    data:
                      id: nw_oereb
                      meta:
                        schemaVersion: 2
                      name: "ÖREB Nidwalden"
                      aliases: [ nw_oereb_test ]
                      basemap: av_sw
                      basemapColorMode: grey
                      themes: "nw:oereb"
                      serviceGroups:
                      - svc: gis_oereb/nw_nutzungsplanung_def
                        opacity: null
                        tree:
                        - id: gis_oereb/nw_nutzungsplanung_def
                          visible: false
                          opacity: null
                          filter: null
                          children:
                          - id: gis_oereb/nw_nutzungsplanung_def/grundnutzung
                            visible: false
                            opacity: null
                            filter: null
                            children: []
                          - id: gis_oereb/nw_nutzungsplanung_def/gefahrenzone
                            visible: true
                            opacity: null
                            filter: null
                            children: []
                      - svc: gis_oereb/nw_kbs_def
                        opacity: null
                        tree:
                        - id: gis_oereb/nw_kbs_def
                          visible: false
                          opacity: null
                          filter: null
                          children: []
                      - svc: ch.astra.baulinien-nationalstrassen
                        opacity: null
                        tree:
                        - id: ch.astra.baulinien-nationalstrassen
                          visible: false
                          opacity: null
                          filter: null
                          children: []
        "404":
          description: Bookmark nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/cache:
    get:
      tags: [ Cache ]
      summary: Cache-Statistiken
      description: Zeigt Anzahl gecachter Einträge, Grösse und Alter.
      responses:
        "200":
          description: Cache-Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      entries:
                        type: integer
                        example: 5
                      totalFormatted:
                        type: string
                        example: "2.1 MB"
                      files:
                        type: array
                        items:
                          type: object
                          properties:
                            key:
                              type: string
                            sizeFormatted:
                              type: string
                            ageFormatted:
                              type: string
    post:
      tags: [ Cache ]
      summary: Cache leeren
      description: Löscht alle gecachten JSON-Dateien. Nächster API-Aufruf baut Cache neu auf.
      parameters:
      - name: action
        in: query
        required: true
        schema:
          type: string
          enum: [ clear ]
      responses:
        "200":
          description: Cache geleert
          content:
            application/json:
              example:
                success: true
                data:
                  message: "Cache cleared successfully"
                  entriesRemoved: 5

  /v1/info:
    get:
      tags: [ System ]
      summary: API-Info und Health-Check
      description: |
        Liefert Informationen über die API, verfügbare Endpoints,  
        Server-Status und Statistiken.
      responses:
        "200":
          description: Erfolgreiche Antwort
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoResponse"

  /v1/legend-proxy.php:
    get:
      tags: [ Legends ]
      summary: ArcGIS Server Legende abrufen
      description: |
        Holt die Legende eines ArcGIS MapServer-Dienstes und rendert sie als
        selbstständiges HTML mit eingebetteten Base64-Symbolen.
        Alternativ als JSON abrufbar.

        **Funktionsweise:**
        1. Holt Legend-JSON vom ArcGIS Server via `agsproxy.php` (Token-Management inklusive)
        2. Skaliert Symbole auf konfigurierbare Grösse (width×height bei einstellbarem DPI)
        3. Zusätzliche CSS-Vergrösserung via `zoom` (Endgrösse = width×zoom × height×zoom)
        4. `#`-Labels werden per Attribut-Query aufgelöst (2-Pass: groupBy + Renderer)
        5. Einträge ohne Lookup-Treffer werden automatisch entfernt
        6. Wenn Code-basierte Layer vorhanden → automatische Gruppierung nach `Gemeinde`
        7. Cache mit 24h TTL (umgehbar mit `nocache=1`)

        **Beispiel-URLs (direkt im Browser öffnen):**
        - Ganzer Dienst: [`?service=ewn/EWN_NIS/MapServer`](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=ewn/EWN_NIS/MapServer)
        - Kleine Symbole: [`?service=ewn/EWN_NIS/MapServer&width=64&height=32`](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=ewn/EWN_NIS/MapServer&width=64&height=32)
        - Gefiltert (Layer 0–2): [`?service=awu/AWU_WERKPLAN/MapServer&layers=0,1,2`](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=awu/AWU_WERKPLAN/MapServer&layers=0,1,2)
        - GWR-Gebäude: [`?service=ewn/EWN_NIS_gwr/MapServer`](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=ewn/EWN_NIS_gwr/MapServer)
        - Werkplan Cache: [`?service=awu/AWU_WERKPLAN_cache/MapServer`](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=awu/AWU_WERKPLAN_cache/MapServer)
        - JSON-Ausgabe: [`?service=ewn/EWN_NIS/MapServer&format=json`](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=ewn/EWN_NIS/MapServer&format=json)
        - Ohne Cache: [`?service=ewn/EWN_NIS/MapServer&nocache=1`](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=ewn/EWN_NIS/MapServer&nocache=1)
        - Nutzungsplanung (Auto-Gruppierung): [`?service=gis_oereb/nw_nutzungsplanung_DEF/MapServer&nocache=1`](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=gis_oereb/nw_nutzungsplanung_DEF/MapServer&nocache=1)
        - Ohne Gruppierung: [`?service=gis_oereb/nw_nutzungsplanung_DEF/MapServer&legendgroup=none&nocache=1`](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=gis_oereb/nw_nutzungsplanung_DEF/MapServer&legendgroup=none&nocache=1)
        - Ohne Label-Auflösung: [`?service=gis_oereb/nw_nutzungsplanung_DEF/MapServer&resolve=false&nocache=1`](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=gis_oereb/nw_nutzungsplanung_DEF/MapServer&resolve=false&nocache=1)

        **Integration in legendResources:**
        ```json
        {
          "ewn/ewn_nis_link": "/maps/tnet/api/v1/legend-proxy.php?service=ewn/EWN_NIS/MapServer",
          "ewn/ewn_nis_title": "Legende: EWN NIS"
        }
        ```
      parameters:
      - name: service
        in: query
        required: true
        description: |
          ArcGIS MapServer-Pfad (ohne Basis-URL).
          `/MapServer` wird automatisch angehängt falls fehlend.
          Entspricht dem `path`-Parameter in `agsproxy.php`.
        schema:
          type: string
        examples:
          ewn_nis:
            summary: EWN NIS (69 Layer, ~1000 Symbole)
            value: ewn/EWN_NIS/MapServer
          awu_werkplan:
            summary: AWU Werkplan
            value: awu/AWU_WERKPLAN/MapServer
          awu_werkplan_cache:
            summary: AWU Werkplan (Cache-Dienst)
            value: awu/AWU_WERKPLAN_cache/MapServer
          ewn_gwr:
            summary: EWN Gebäude- und Wohnungsregister
            value: ewn/EWN_NIS_gwr/MapServer
          awu_eigentum:
            summary: AWU Eigentum
            value: awu/AWU_EIGENTUM/MapServer
          kbs:
            summary: NW Belastete Standorte
            value: gis_fach/nw_kbs/MapServer
          oereb:
            summary: ÖREB Nutzungsplanung (mit #-Labels + Gemeinde-Gruppierung)
            value: gis_oereb/nw_nutzungsplanung_DEF/MapServer
      - name: width
        in: query
        description: |
          Symbolbreite in Pixel für die ArcGIS-Anfrage.
          ArcGIS rendert das Symbol in dieser Grösse. Die Anzeige wird zusätzlich
          mit dem `zoom`-Faktor skaliert (Endgrösse = width × zoom).
        schema:
          type: integer
          default: 16
          minimum: 8
          maximum: 512
        examples:
          standard:
            summary: Standard (16px)
            value: 16
          gross:
            summary: Gross (32px)
            value: 32
      - name: height
        in: query
        description: |
          Symbolhöhe in Pixel für die ArcGIS-Anfrage.
          Endgrösse = height × zoom.
        schema:
          type: integer
          default: 10
          minimum: 8
          maximum: 512
        examples:
          standard:
            summary: Standard (10px)
            value: 10
          quadratisch:
            summary: Quadratisch (16px)
            value: 16
      - name: dpi
        in: query
        description: |
          DPI für das ArcGIS-Symbol-Rendering. Höherer DPI = dickere Linien und Punkte.
          Symbolgrössen in ArcGIS sind in pt definiert — höherer DPI = mehr Pixel pro pt.
          - `96` = ArcGIS-Standard (dünn)
          - `192` = 2× dicker
          - `288` = 3× dicker (Standard)
        schema:
          type: integer
          default: 288
          minimum: 72
          maximum: 600
        examples:
          standard:
            summary: Standard (288 DPI, 3× dicker)
            value: 288
          arcgis_default:
            summary: ArcGIS-Standard (96 DPI, dünn)
            value: 96
          mittel:
            summary: Mittel (192 DPI, 2× dicker)
            value: 192
      - name: zoom
        in: query
        description: |
          Zusätzliche CSS-Vergrösserung der Symbol-Anzeige.
          Endgrösse = width×zoom × height×zoom Pixel.
          `1.0` = keine Vergrösserung, `3.0` = 3-fach (Standard).
        schema:
          type: number
          format: float
          default: 3.0
          minimum: 0.5
          maximum: 5.0
        examples:
          standard:
            summary: Standard (3×)
            value: 3.0
          original:
            summary: Originalgrösse (1×)
            value: 1.0
      - name: resolve
        in: query
        description: |
          Aktiviert die Auflösung von `#`-Labels via Attribut-Queries.
          Wenn `true` (Standard): Labels mit `#` werden durch lesbare Bezeichnungen
          ersetzt (via `codefield`/`labelfield`). Einträge ohne Lookup-Treffer
          werden aus der Legende entfernt.
          Wenn `false`: Labels bleiben unverändert (Roh-Darstellung mit Codes wie `W3a#Wohnzone`).
        schema:
          type: boolean
          default: true
        examples:
          aktiv:
            summary: Label-Auflösung aktiv (Standard)
            value: true
          deaktiviert:
            summary: Roh-Labels anzeigen
            value: false
      - name: labelfield
        in: query
        description: |
          Feldname für die Legendenbezeichnung bei `#`-Label-Auflösung.
          Wird zusammen mit `codefield` per `groupByFieldsForStatistics` abgefragt.
          Nur relevant wenn `resolve=true`.
        schema:
          type: string
          default: Typ_Bezeichnung
      - name: codefield
        in: query
        description: |
          Feldname für den Darstellungscode bei `#`-Label-Auflösung.
          Die Query gruppiert nach `codefield` + `labelfield` und ersetzt das
          `#`-Label durch die aufgelöste Bezeichnung.
          Nur relevant wenn `resolve=true`.
        schema:
          type: string
          default: Typ_Darstellungscode
      - name: legendgroup
        in: query
        description: |
          Attributfeld für die Gruppierung der Legende in zusammenklappbare Sektionen.
          Wenn gesetzt, wird für jeden Wert des Felds (z.B. jede Gemeinde) eine eigene
          Sektion erzeugt, die nur die dort vorkommenden Symbole enthält.

          **Auto-Default:** Wenn nicht angegeben und Code-basierte Layer vorhanden (values-Array),
          wird automatisch `Gemeinde` als Gruppierungsfeld gesetzt.

          Spezialwert `none` deaktiviert die Gruppierung explizit.
        schema:
          type: string
          default: "Gemeinde (auto bei Code-Layern)"
        examples:
          gemeinde:
            summary: Nach Gemeinde gruppieren
            value: Gemeinde
          keine:
            summary: Gruppierung deaktivieren
            value: none
      - name: layers
        in: query
        description: |
          Komma-separierte Layer-IDs zum Filtern.
          Ohne diesen Parameter werden alle Layer des Dienstes angezeigt.
        schema:
          type: string
        examples:
          erste_drei:
            summary: Layer 0, 1 und 2
            value: "0,1,2"
          einzeln:
            summary: Nur Layer 5
            value: "5"
      - name: format
        in: query
        description: |
          Ausgabeformat: `html` (Standard) oder `json`.
          JSON liefert die rohen Legenddaten inkl. Base64-Bildern.
          Bei Gruppierung enthält die JSON-Antwort ein `groups`-Array statt `layers`.
        schema:
          type: string
          enum: [ html, json ]
          default: html
      - name: nocache
        in: query
        description: |
          Cache umgehen (`1` = ja). Erzwingt eine frische Abfrage vom ArcGIS Server.
          Nützlich nach Server-Updates oder Symboländerungen.
          Cache-TTL: 24 Stunden.
        schema:
          type: integer
          enum: [ 0, 1 ]
          default: 0
      - name: inject
        in: query
        description: |
          Metadata-Injection aktivieren (default: `true`).
          Lädt `legend_wms_metadata.json` (gleiche Datei wie WMS-Proxy) und fügt pro
          Layer passende Metadata-Felder (`title`, `description`, ...) hinzu.
          Lookup-Priorität:
          1. `service::<servicePfad>::<layerName>` (spezifisch)
          2. `layer::<layerName>` (global für alle Services)
          Bei `false`: keine Injection, Cache-Key ändert sich entsprechend.
        schema:
          type: boolean
          default: true
      responses:
        "200":
          description: |
            Erfolgreiche Antwort.
            Bei `format=html`: Selbstständige HTML-Seite mit eingebetteten Symbolen.
            Bei `format=json`: Strukturiertes JSON mit Layer- und Symbol-Informationen.

            **Live-Vorschau (HTML — direkt im Browser öffnen):**
            - [EWN NIS — Standard](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=ewn/EWN_NIS/MapServer)
            - [AWU Werkplan](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=awu/AWU_WERKPLAN/MapServer)
            - [ÖREB Nutzungsplanung — Gruppiert nach Gemeinde](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=gis_oereb/nw_nutzungsplanung_DEF/MapServer&nocache=1)
            - [ÖREB Nutzungsplanung — Ohne Gruppierung](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=gis_oereb/nw_nutzungsplanung_DEF/MapServer&legendgroup=none&nocache=1)
            - [ÖREB Nutzungsplanung — Roh-Labels (resolve=false)](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=gis_oereb/nw_nutzungsplanung_DEF/MapServer&resolve=false&legendgroup=none&nocache=1)

            **Live-Vorschau (JSON):**
            - [EWN NIS — JSON](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=ewn/EWN_NIS/MapServer&format=json)
            - [ÖREB Nutzungsplanung — JSON gruppiert](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy.php?service=gis_oereb/nw_nutzungsplanung_DEF/MapServer&format=json&nocache=1)
          content:
            text/html:
              schema:
                type: string
                description: Selbstständige HTML-Seite mit CSS, Base64-Symbolen und responsivem Layout.
            application/json:
              schema:
                $ref: "#/components/schemas/LegendJsonResponse"
              example:
                service: ewn/EWN_NIS/MapServer
                requestedSize:
                  width: 80
                  height: 160
                layerCount: 69
                symbolCount: 1019
                layers:
                - layerId: 0
                  layerName: Trassee Elektro
                  symbolCount: 5
                  symbols:
                  - label: "110kV"
                    width: 106
                    height: 20
                    contentType: image/png
                    imageData: "iVBORw0KGgo..."
        "400":
          description: Fehlender oder ungültiger `service`-Parameter
          content:
            application/json:
              example:
                error: true
                message: "Parameter 'service' fehlt. Beispiel: ?service=ewn/EWN_NIS/MapServer"
        "502":
          description: ArcGIS Server nicht erreichbar oder ungültige Antwort
          content:
            application/json:
              example:
                error: true
                message: "ArcGIS Legend-Endpunkt nicht erreichbar"
                service: ewn/EWN_NIS/MapServer
                statusCode: 0

  /v1/legend-proxy-wms.php:
    get:
      tags: [ Legends ]
      summary: WMS Legende abrufen (QMAP/GetLegendGraphic)
      description: |
        Holt WMS-Legenden via `GetLegendGraphic` fuer einen oder mehrere Layer.
        Ausgabe als HTML (Standard) oder JSON.

        **Fokus:**
        - QMAP/WMS Services (`/qmap/...`)
        - Mehrere Layer in einem Request
        - Base64-eingebettete Symbole
        - Optionaler Metadata-Injection-Hook (`inject=1`)

        **Beispiel-URL (direkt):**
        - [`https://www.gis-daten.ch/qmap/test/kulturobjekte_nw_pg?SERVICE=WMS&VERSION=1.3.0&REQUEST=GetLegendGraphic&LAYER=Kulturobjekte%20Flaeche&FORMAT=image/png&STYLE=default&SLD_VERSION=1.1.0`](https://www.gis-daten.ch/qmap/test/kulturobjekte_nw_pg?SERVICE=WMS&VERSION=1.3.0&REQUEST=GetLegendGraphic&LAYER=Kulturobjekte%20Flaeche&FORMAT=image/png&STYLE=default&SLD_VERSION=1.1.0)

        **Proxy-Beispiele:**
        - Einzel-Layer (HTML): [`/maps/tnet/api/v1/legend-proxy-wms.php?service=/qmap/test/kulturobjekte_nw_pg&layer=Kulturobjekte%20Flaeche`](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy-wms.php?service=/qmap/test/kulturobjekte_nw_pg&layer=Kulturobjekte%20Flaeche)
        - Multi-Layer (HTML): [`/maps/tnet/api/v1/legend-proxy-wms.php?service=/qmap/test/kulturobjekte_nw_pg&layers=Kulturobjekte%20Flaeche,Kulturobjekte%20Linien`](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy-wms.php?service=/qmap/test/kulturobjekte_nw_pg&layers=Kulturobjekte%20Flaeche,Kulturobjekte%20Linien)
        - JSON: [`/maps/tnet/api/v1/legend-proxy-wms.php?service=/qmap/test/kulturobjekte_nw_pg&layers=Kulturobjekte%20Flaeche&format=json`](https://www.gis-daten.ch/maps/tnet/api/v1/legend-proxy-wms.php?service=/qmap/test/kulturobjekte_nw_pg&layers=Kulturobjekte%20Flaeche&format=json)
      parameters:
      - name: service
        in: query
        required: true
        description: |
          WMS-Basispfad ohne Query-String.
          Erlaubt: relativer Pfad (`/qmap/...`) oder absolute http(s)-URL.
        schema:
          type: string
        examples:
          qmap_relative:
            summary: Relativer QMAP-Pfad
            value: /qmap/test/kulturobjekte_nw_pg
          qmap_absolute:
            summary: Absolute URL
            value: https://www.gis-daten.ch/qmap/test/kulturobjekte_nw_pg
      - name: layers
        in: query
        description: Komma-separierte Layernamen.
        schema:
          type: string
        examples:
          two_layers:
            value: Kulturobjekte Flaeche,Kulturobjekte Linien
      - name: layer
        in: query
        description: Einzelner Layername (Alias zu `layers`).
        schema:
          type: string
        examples:
          one_layer:
            value: Kulturobjekte Flaeche
      - name: width
        in: query
        description: Gewuenschte Legendengrafik-Breite in Pixel.
        schema:
          type: integer
          default: 32
          minimum: 8
          maximum: 512
      - name: height
        in: query
        description: Gewuenschte Legendengrafik-Hoehe in Pixel.
        schema:
          type: integer
          default: 24
          minimum: 8
          maximum: 512
      - name: style
        in: query
        description: WMS Style (Default `default`).
        schema:
          type: string
          default: default
      - name: version
        in: query
        description: WMS-Version.
        schema:
          type: string
          default: 1.3.0
      - name: sld_version
        in: query
        description: SLD-Version fuer `GetLegendGraphic`.
        schema:
          type: string
          default: 1.1.0
      - name: inject
        in: query
        description: Metadata-Injection aktivieren (`1`) oder deaktivieren (`0`).
        schema:
          type: integer
          enum: [ 0, 1 ]
          default: 1
      - name: format
        in: query
        description: Ausgabeformat (`html` oder `json`).
        schema:
          type: string
          enum: [ html, json ]
          default: html
      - name: nocache
        in: query
        description: Cache umgehen (`1` = ja).
        schema:
          type: integer
          enum: [ 0, 1 ]
          default: 0
      responses:
        "200":
          description: Erfolgreiche WMS-Legendenantwort (HTML oder JSON)
          content:
            text/html:
              schema:
                type: string
            application/json:
              schema:
                type: object
              example:
                success: true
                service: /qmap/test/kulturobjekte_nw_pg
                layerCount: 2
                layers:
                - layer: Kulturobjekte Flaeche
                  imageMime: image/png
                  imageDataUrl: data:image/png;base64,iVBORw0KGgo...
                - layer: Kulturobjekte Linien
                  imageMime: image/png
                  imageDataUrl: data:image/png;base64,iVBORw0KGgo...
        "400":
          description: Fehlender oder ungültiger Parameter
          content:
            application/json:
              example:
                success: false
                error: Parameter "service" fehlt.
        "502":
          description: Kein Layer lieferte eine verwertbare WMS-Legende
          content:
            application/json:
              example:
                success: false
                message: Keine WMS-Legende abrufbar.
                errors:
                - layer: Kulturobjekte Flaeche
                  httpCode: 404
                  error: WMS antwortete nicht mit HTTP 200

  /v1/tree-test.html:
