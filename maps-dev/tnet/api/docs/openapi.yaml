  /v1/slm.html:
    get:
      tags: [ Tools ]
      summary: Service- und Layermanager
      description: |
        Eigenständige Seite für Service → MapPlus Roh-Konfiguration Import & Verwaltung.

        **Direkt im Browser öffnen:**
        [`/maps/tnet/api/v1/slm.html`](https://www.gis-daten.ch/maps/tnet/api/v1/slm.html)

        Features:
        - **Import-Tab**: Verfügbare AGS-Dienste mit Checkboxen auswählen, Alle/Keine, Shift-Range, Multi-Export nach `data/tmp/raw-conf/`
        - **Verwalten-Tab**: Bestehende Roh-Konfigurationen anzeigen, Multi-Select mit Checkboxen auf Service-Ebene, Multi-Delete, Backup-Filter und Backup-Delete
        - **Staging-Tab**: Services zu Kürzel-basierten Ausgabedateien zusammenführen. Unterstützt inkrementellen Merge (mode=merge), Ersetzen (mode=replace) und Vorschau (mode=preview). Staging-Manifest trackt Quell-Services.
        - Nutzt dieselbe `treebuilder-api.php` API (Aktionen: `ags-services`, `ags-export`, `ags-list-raw`, `ags-delete-raw`, `ags-delete-backups`, `ags-stage-merge`, `staging-list-output`)
      responses:
        "200":
          description: HTML-Seite mit Service- und Layermanager UI
          content:
            text/html:
              schema:
                type: string

  /v1/admin:
    get:
      tags: [ Admin ]
      summary: DB-Management und Synchronisation
      description: |
        Steuert die PostgreSQL-Datenbank (Schema `mapplusconf`):
        - **status** — DB-Verbindung und Schema prüfen
        - **schema** — Schema anlegen/aktualisieren (idempotent)
        - **configToPG** — Config-Dateien → PostgreSQL synchronisieren
        - **stats** — Tabellenstatistiken
        - **log** — Import-Historie
      parameters:
      - name: action
        in: query
        required: true
        description: "Auszuführende Aktion"
        schema:
          type: string
          enum: [ status, schema, configToPG, stats, log ]
      - name: scope
        in: query
        description: "Sync-Bereich (nur bei action=configToPG)"
        schema:
          type: string
          enum: [ full, layers, catalog, maptips, nls ]
          default: full
      - name: limit
        in: query
        description: "Max. Anzahl Log-Einträge (nur bei action=log, max 100)"
        schema:
          type: integer
          default: 10
          maximum: 100
      responses:
        "200":
          description: Erfolgreiche Antwort
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              examples:
                status:
                  summary: DB-Status
                  value:
                    success: true
                    data:
                      database: { available: true, message: "OK" }
                      schema: { exists: true, tables: 9 }
                    meta: { action: status, responseTime: "45ms" }
                configToPG:
                  summary: Full-Sync Resultat
                  value:
                    success: true
                    data:
                      message: "configToPG abgeschlossen (scope: full)"
                      stats:
                        layers_upserted: 10010
                        layers_deleted: 0
                        nodes_upserted: 7875
                        nodes_deleted: 0
                        maptips_upserted: 25900
                        maptips_deleted: 0
                    meta: { action: configToPG, scope: full, responseTime: "20777ms" }
                stats:
                  summary: Tabellenstatistiken
                  value:
                    success: true
                    data:
                      tableCounts:
                        profile: 5
                        category_mapping: 4
                        layer_definition: 9999
                        catalog_node: 7875
                        layer_maptip: 25900
                        nls_resource: 158
                      sourceFiles: 378
                      activeProfiles: 5
                    meta: { action: stats, responseTime: "47ms" }
        "400":
          description: Unbekannte Aktion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Fehler bei der Ausführung
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ===== TREE-BUILDER API =====

  /v1/treebuilder-api.php:
    get:
      tags: [ Tree-Builder ]
      summary: Tree-Builder State & Daten abrufen
      description: |
        Liest den aktuellen State, Lock-Status, Backup-Historie, Gruppen-Dateien,
        Profile und Lyrmgr-Konfiguration.

        **Verfügbare GET-Aktionen:**
        | Aktion | Beschreibung | Zusatzparameter |
        |--------|-------------|-----------------|
        | `load` | Aktuellen State + Lock-Info laden | — |
        | `lock` | Lock setzen (Header `X-Editor-Name` oder `?editor=`) | `editor` |
        | `unlock` | Lock freigeben | `editor` |
        | `lock-status` | Lock-Status abfragen | — |
        | `history` | Backup-Historie auflisten | — |
        | `restore` | Backup wiederherstellen | `file` |
        | `load-groups` | JSON5-Gruppendatei laden | — |
        | `load-profile` | Einzelnes Profil laden | `name` |
        | `list-profiles` | Alle Profile auflisten | — |
        | `load-lyrmgr` | Lyrmgr.conf eines Profils laden | `profile` |
        | `list-lyrmgr-profiles` | Lyrmgr-Profile auflisten | — |
      operationId: treebuilderGet
      parameters:
      - name: action
        in: query
        required: true
        description: "Auszuführende Aktion"
        schema:
          type: string
          enum: [ load, lock, unlock, lock-status, history, restore, load-groups, load-profile, list-profiles, load-lyrmgr, list-lyrmgr-profiles ]
      - name: editor
        in: query
        description: "Editor-Name für Lock-Operationen (alternativ: Header `X-Editor-Name`)"
        schema:
          type: string
        example: Marco
      - name: file
        in: query
        description: "Backup-Dateiname (nur bei action=restore)"
        schema:
          type: string
        example: state_20250101_120000.json
      - name: name
        in: query
        description: "Profil-Name (nur bei action=load-profile)"
        schema:
          type: string
        example: nwpro
      - name: profile
        in: query
        description: "Lyrmgr-Profil (nur bei action=load-lyrmgr)"
        schema:
          type: string
        example: public
      responses:
        "200":
          description: Erfolgreiche Antwort
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              examples:
                load:
                  summary: "State laden"
                  value:
                    success: true
                    data:
                      exists: true
                      data: { layers: [], groups: [], _meta: {} }
                      lock: null
                      size: 4096
                lockStatus:
                  summary: "Lock-Status"
                  value:
                    success: true
                    data:
                      locked: true
                      lock: { editor: "Marco", datetime: "2025-01-15 10:30:00" }
                      age_min: 5.2
                history:
                  summary: "Backup-Historie"
                  value:
                    success: true
                    data:
                    - file: state_20250115_103000.json
                      size: 4096
                      modified: "2025-01-15 10:30:00"
                listProfiles:
                  summary: "Profile auflisten"
                  value:
                    success: true
                    data:
                    - name: nwpro
                      size: 12345
                      modified: "2025-01-15 10:30:00"
                    - name: owpro
                      size: 8765
                      modified: "2025-01-14 09:00:00"
        "400":
          description: Fehlende Parameter
        "405":
          description: Methode nicht erlaubt
        "423":
          description: Gesperrt von anderem Editor

    post:
      tags: [ Tree-Builder ]
      summary: Tree-Builder State & Daten speichern
      description: |
        Speichert State, JSON5-Gruppen, Profile und publiziert Lyrmgr-Blöcke.
        Erstellt automatisch Backups beim Speichern.

        **Verfügbare POST-Aktionen:**
        | Aktion | Beschreibung | Body |
        |--------|-------------|------|
        | `save` | State speichern (mit Backup) | Vollständiger State als JSON |
        | `save-groups` | JSON5-Gruppendatei speichern | Raw JSON5-Text |
        | `save-profile` | Profil speichern (`?name=...`) | Raw JSON5-Text |
        | `publish-lyrmgr` | Lyrmgr-Block publizieren | `{ profile, lyrmgrKey, data }` |
      operationId: treebuilderPost
      parameters:
      - name: action
        in: query
        required: true
        description: "Auszuführende Aktion"
        schema:
          type: string
          enum: [ save, save-groups, save-profile, publish-lyrmgr ]
      - name: name
        in: query
        description: "Profil-Name (nur bei action=save-profile)"
        schema:
          type: string
        example: nwpro
      - name: editor
        in: query
        description: "Editor-Name (alternativ: Header `X-Editor-Name`)"
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: "Inhalt abhängig von der Aktion"
            examples:
              save:
                summary: "State speichern"
                value:
                  layers: []
                  groups: []
                  profiles: {}
              publishLyrmgr:
                summary: "Lyrmgr publizieren"
                value:
                  profile: nwpro
                  lyrmgrKey: grundlagen/av
                  data:
                    layers:
                    - TNET_gis_basis/nw_amtliche_vermessung
          text/plain:
            schema:
              type: string
              description: "Raw JSON5-Text (für action=save-groups, save-profile)"
      responses:
        "200":
          description: Erfolgreiche Antwort
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              examples:
                saved:
                  summary: "State gespeichert"
                  value:
                    success: true
                    data:
                      saved: true
                      bytes: 4096
                      backup: state_20250115_103000.json
        "400":
          description: Ungültiger Body oder fehlende Parameter
        "405":
          description: Methode nicht erlaubt (POST required)
        "423":
          description: Gesperrt von anderem Editor
        "500":
          description: Speichern fehlgeschlagen

  # ===== SERVICE- UND LAYERMANAGER =====

  /v1/treebuilder-api.php/ags:
    get:
      tags: [ Service- und Layermanager ]
      summary: AGS-Dienste & Roh-Konfigurationen abrufen
      description: |
        Abrufen der verfügbaren ArcGIS Server-Dienste von der externen API (`ags2mapplus`)
        und Verwalten der lokal gespeicherten Roh-Konfigurationsdateien.

        **Verfügbare GET-Aktionen:**
        | Aktion | Beschreibung | Zusatzparameter |
        |--------|-------------|-----------------|
        | `ags-services` | Verfügbare AGS-Dienste von der externen API abrufen | — |
        | `ags-list-raw` | Importierte Roh-Konfigurationen auflisten (gruppiert nach Service) | `includeBackups`, `backupOnly` |
        | `ags-read-raw` | Einzelne Roh-Konfigurationsdatei lesen | `file` |

        **Hinweis:** Der tatsächliche Endpunkt ist `treebuilder-api.php?action=ags-*`.
        Die Pfad-Darstellung `/ags` dient nur der besseren Übersicht in der Dokumentation.
      operationId: agsGet
      parameters:
      - name: action
        in: query
        required: true
        description: "Auszuführende AGS-Aktion"
        schema:
          type: string
          enum: [ ags-services, ags-list-raw, ags-read-raw ]
      - name: includeBackups
        in: query
        description: "Backups zusätzlich einbeziehen (nur bei action=ags-list-raw)"
        schema:
          type: string
          enum: [ "1", "0" ]
          default: "0"
      - name: backupOnly
        in: query
        description: "Nur Backup-Dateien listen (nur bei action=ags-list-raw)"
        schema:
          type: string
          enum: [ "1", "0" ]
          default: "0"
      - name: file
        in: query
        description: "Relativer Dateipfad innerhalb von `data/tmp/raw-conf/` (nur bei action=ags-read-raw)"
        schema:
          type: string
        example: awu/AWU_EIGENTUM/layers_TNET_awu_AWU_EIGENTUM.conf
      responses:
        "200":
          description: Erfolgreiche Antwort
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/AgsServicesResponse"
                - $ref: "#/components/schemas/AgsListRawResponse"
                - $ref: "#/components/schemas/AgsReadRawResponse"
              examples:
                services:
                  summary: "AGS-Dienste auflisten"
                  value:
                    success: true
                    data:
                      dienstnamen:
                      - awu/AWU_EIGENTUM
                      - awu/AWU_WERKPLAN
                      - ewn/ewn_fernwaerme_agp
                      - gis_basis/nw_amtliche_vermessung
                listRaw:
                  summary: "Roh-Konfigurationen auflisten"
                  value:
                    success: true
                    data:
                      exists: true
                      directory: /data/Client_Data/nwow/tmp/raw-conf
                      includeBackups: false
                      backupOnly: false
                      services:
                      - service: awu/AWU_EIGENTUM
                        totalSize: 8234
                        files:
                        - file: awu/AWU_EIGENTUM/layers_TNET_awu_AWU_EIGENTUM.conf
                          size: 4567
                          modified: "2025-01-15 10:30:00"
                          isBackup: false
                        - file: awu/AWU_EIGENTUM/layers_TNET_awu_AWU_EIGENTUM_cache.conf
                          size: 3667
                          modified: "2025-01-15 10:30:00"
                          isBackup: false
                      files:
                      - file: awu/AWU_EIGENTUM/layers_TNET_awu_AWU_EIGENTUM.conf
                        size: 4567
                        modified: "2025-01-15 10:30:00"
                        isBackup: false
                readRaw:
                  summary: "Einzelne Datei lesen"
                  value:
                    success: true
                    data:
                      file: awu/AWU_EIGENTUM/layers_TNET_awu_AWU_EIGENTUM.conf
                      content: "[layers_TNET_awu_AWU_EIGENTUM]

                        type=arcgisRest

                        ..."
                      size: 4567
        "404":
          description: Datei nicht gefunden
        "502":
          description: Externe API nicht erreichbar

    post:
      tags: [ Service- und Layermanager ]
      summary: AGS-Dienste importieren oder löschen
      description: |
        Importiert ArcGIS Server-Konfigurationen von der externen `ags2mapplus`-API
        (ZIP-Download + Extraktion) oder löscht bestehende Roh-Konfigurationen.

        **Verfügbare POST-Aktionen:**
        | Aktion | Beschreibung | Body |
        |--------|-------------|------|
        | `ags-export` | Dienste von externer API importieren → ZIP entpacken → `data/tmp/raw-conf/` | `{ "dienstnamen": ["awu/AWU_EIGENTUM", ...] }` |
        | `ags-delete-raw` | Alle Dateien eines Services löschen (inkl. Backups) | `{ "service": "awu/AWU_EIGENTUM" }` |
        | `ags-delete-backups` | Nur Backup-Dateien eines Services löschen | `{ "service": "awu/AWU_EIGENTUM" }` |

        **Hinweis:** Der tatsächliche Endpunkt ist `treebuilder-api.php?action=ags-*`.
        Die Pfad-Darstellung `/ags` dient nur der besseren Übersicht in der Dokumentation.

        ### Import-Ablauf (ags-export)
        1. POST an externe API `ags2mapplus/mapplus-conf-export` mit Dienstnamen
        2. ZIP-Antwort empfangen, Magic-Bytes validieren
        3. Bestehende Dateien werden mit Timestamp-Suffix gesichert (`.bak`)
        4. ZIP nach `data/tmp/raw-conf/` entpacken
      operationId: agsPost
      parameters:
      - name: action
        in: query
        required: true
        description: "Auszuführende AGS-Aktion"
        schema:
          type: string
          enum: [ ags-export, ags-delete-raw, ags-delete-backups ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: "#/components/schemas/AgsExportRequest"
              - $ref: "#/components/schemas/AgsDeleteRequest"
            examples:
              export:
                summary: "Dienste importieren"
                value:
                  dienstnamen:
                  - awu/AWU_EIGENTUM
                  - awu/AWU_WERKPLAN
              delete:
                summary: "Service löschen"
                value:
                  service: awu/AWU_EIGENTUM
      responses:
        "200":
          description: Erfolgreiche Antwort
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/AgsExportResponse"
                - $ref: "#/components/schemas/AgsDeleteResponse"
              examples:
                exported:
                  summary: "Import erfolgreich"
                  value:
                    success: true
                    data:
                      success: true
                      services:
                      - awu/AWU_EIGENTUM
                      - awu/AWU_WERKPLAN
                      zipSize: 45678
                      files:
                      - file: awu/AWU_EIGENTUM/layers_TNET_awu_AWU_EIGENTUM.conf
                        bytes: 4567
                      - file: awu/AWU_WERKPLAN/layers_TNET_awu_AWU_WERKPLAN.conf
                        bytes: 3456
                      timestamp: "2025-01-15 10:30:00"
                deleted:
                  summary: "Service gelöscht"
                  value:
                    success: true
                    data:
                      success: true
                      service: awu/AWU_EIGENTUM
                      deleted:
                      - awu/AWU_EIGENTUM/layers_TNET_awu_AWU_EIGENTUM.conf
                      - awu/AWU_EIGENTUM/layers_TNET_awu_AWU_EIGENTUM_cache.conf
                      count: 2
        "400":
          description: Fehlende oder ungültige Parameter
        "405":
          description: Methode nicht erlaubt (POST required)
        "500":
          description: Import oder Löschung fehlgeschlagen

  /v1/treebuilder-api.php/staging:
    get:
      tags: [ Service- und Layermanager ]
      summary: Staging-Ausgabe (ImportToCore) auflisten
      description: |
        Listet alle Kürzel-Verzeichnisse unter `ImportToCore/` mit Dateien,
        Duplikat-Metadaten, Cross-Kürzel-Konflikten und Staging-Manifest.

        **Hinweis:** Der tatsächliche Endpunkt ist `treebuilder-api.php?action=staging-list-output`.
      operationId: stagingListOutput
      parameters:
      - name: action
        in: query
        required: true
        schema:
          type: string
          enum: [ staging-list-output ]
      responses:
        "200":
          description: Kürzel-Liste mit Dateien und Manifest-Info
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      exists:
                        type: boolean
                      kuerzel:
                        type: array
                        items:
                          type: object
                          properties:
                            kuerzel:
                              type: string
                              example: "ewn"
                            files:
                              type: array
                              items:
                                type: object
                            size:
                              type: integer
                            manifest:
                              $ref: "#/components/schemas/StagingManifest"

    post:
      tags: [ Service- und Layermanager ]
      summary: Staging-Merge (Services → ImportToCore zusammenführen)
      description: |
        Führt ausgewählte Raw-Conf-Services zu Kürzel-basierten Ausgabedateien zusammen.

        **Merge-Modi:**
        | Modus | Verhalten |
        |-------|-----------|
        | `merge` | Bestehende ImportToCore-Datei als Basis laden, neue Keys hinzufügen/aktualisieren. Bestehende bleiben erhalten. |
        | `replace` | Alles neu aufbauen — bestehende Ausgabe wird komplett überschrieben (bisheriges Verhalten). |
        | `preview` | Dry-Run: berechnet Diff-Statistik (added/updated/unchanged), schreibt nichts. |

        **Merge-Ablauf (mode=merge):**
        1. Bestehende `<prefix>_<kuerzel>.<ext>` aus `ImportToCore/<kuerzel>/` laden
        2. Neue Keys aus den ausgewählten raw-conf-Services darüber mergen (letzter gewinnt bei Duplikaten)
        3. Output schreiben + `.staging-manifest.json` mit Source-Tracking aktualisieren
        4. Statistik zurückgeben: `mergeStats` pro Bucket (added, updated, unchanged)

        **Manifest:** Bei `merge` und `replace` wird `.staging-manifest.json` geschrieben mit:
        - `sources[]`: Array aller Services die in diese Ausgabe eingeflossen sind (kumulativ bei merge)
        - `buckets`: Datei-Übersicht pro Prefix mit Key-Counts
        - `lastStaged`: Zeitstempel

        **Hinweis:** Der tatsächliche Endpunkt ist `treebuilder-api.php?action=ags-stage-merge`.
      operationId: stagingMerge
      parameters:
      - name: action
        in: query
        required: true
        schema:
          type: string
          enum: [ ags-stage-merge, staging-delete-output ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StagingMergeRequest"
            examples:
              merge:
                summary: "Inkrementell zusammenführen"
                value:
                  services: [ "ewn/ewn_EWN_NIS_gwr" ]
                  kuerzel: "ewn"
                  mode: "merge"
              replace:
                summary: "Komplett ersetzen"
                value:
                  services: [ "ewn/ewn_EWN_NIS", "ewn/ewn_EWN_NIS_gwr" ]
                  kuerzel: "ewn"
                  mode: "replace"
              preview:
                summary: "Nur Vorschau"
                value:
                  services: [ "ewn/ewn_EWN_NIS_gwr" ]
                  kuerzel: "ewn"
                  mode: "preview"
      responses:
        "200":
          description: Merge-Ergebnis
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/StagingMergeResponse"
              examples:
                merged:
                  summary: "Inkrementeller Merge erfolgreich"
                  value:
                    success: true
                    data:
                      success: true
                      kuerzel: "ewn"
                      mode: "merge"
                      files:
                      - file: "ewn/layers_ewn.conf"
                        bytes: 12345
                        keys: 57
                        mergeStats: { added: 12, updated: 3, unchanged: 42 }
                      mergeStats:
                        layers: { added: 12, updated: 3, unchanged: 42 }
                        maptips: { added: 24, updated: 0, unchanged: 84 }
                      duplicates: []
                      errors: []
                      timestamp: "2026-03-01 14:30:00"
        "400":
          description: Fehlende oder ungültige Parameter
        "405":
          description: Methode nicht erlaubt (POST required)

components:
  schemas:
    # === Base Response ===
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        meta:
          type: object
      required: [ success, data ]

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: integer
              example: 404
            message:
              type: string
              example: "Resource not found"
      required: [ success, error ]

    # === Layer Schemas ===
    LayerCatalogResponse:
      allOf:
      - $ref: "#/components/schemas/SuccessResponse"
      - type: object
        properties:
          data:
            type: object
            properties:
              version:
                type: string
                example: "2.0"
              categories:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

    Category:
      type: object
      properties:
        id:
          type: string
          example: nidwalden
        name:
          type: string
          example: Nidwalden
        icon:
          type: string
          example: njsCategoryIcon8
        subcategories:
          type: array
          items:
            $ref: "#/components/schemas/Subcategory"

    Subcategory:
      type: object
      properties:
        id:
          type: string
          example: grundlagen
        name:
          type: string
          example: Grundlagen
        icon:
          type: string
        groups:
          type: array
          items:
            $ref: "#/components/schemas/LayerGroup"

    LayerGroup:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        open:
          type: boolean
          default: false
        layers:
          type: array
          items:
            $ref: "#/components/schemas/Layer"

    Layer:
      type: object
      properties:
        id:
          type: string
          example: "TNET_gis_basis/nw_amtliche_vermessung"
        name:
          type: string
          example: "Amtliche Vermessung"
        type:
          type: string
          enum: [ layer, group ]
        url:
          type: string
          example: "/maps/agsproxy.php?path=gis_basis/nw_amtliche_vermessung/MapServer"
        layerType:
          type: string
          enum: [ arcgisRest, wms, wmts, tileWMS ]
        opacity:
          type: number
          format: float
          example: 0.65
        visible:
          type: boolean
          default: false
        params:
          type: object
        options:
          type: object
        layers:
          type: array
          description: "Nur bei type=group: verschachtelte Layer (max. 3 Ebenen tief)"
          items:
            type: object
            description: "Verschachtelter Layer oder Gruppe"
            properties:
              id:
                type: string
              name:
                type: string
              type:
                type: string
                enum: [ layer, group ]

    # === Basemaps ===
    BasemapsResponse:
      allOf:
      - $ref: "#/components/schemas/SuccessResponse"
      - type: object
        properties:
          data:
            type: object
            description: "Basemaps-Konfiguration (Struktur aus basemaps.conf)"

    # === Bookmarks ===
    BookmarkListResponse:
      allOf:
      - $ref: "#/components/schemas/SuccessResponse"
      - type: object
        properties:
          data:
            type: array
            description: Kompakte Liste aller Bookmarks (id, name, aliases, basemapColorMode)
            items:
              type: object
              properties:
                id:
                  type: string
                  example: nw_oereb
                name:
                  type: string
                  example: "ÖREB Nidwalden"
                aliases:
                  type: array
                  items:
                    type: string
                basemapColorMode:
                  type: string
                  enum: [ color, grey ]
                  example: grey
          meta:
            type: object
            properties:
              count:
                type: integer
                example: 42
              source:
                type: string
                enum: [ db, file ]
                example: db
              hierarchy:
                type: boolean
                example: false
              schemaVersion:
                type: integer
                example: 2

    BookmarkDetailResponse:
      allOf:
      - $ref: "#/components/schemas/SuccessResponse"
      - type: object
        properties:
          data:
            type: object
            properties:
              id:
                type: string
                example: nw_oereb
              name:
                type: string
                example: "ÖREB Nidwalden"
              aliases:
                type: array
                items:
                  type: string
              basemap:
                type: string
                example: av_sw
              basemapColorMode:
                type: string
                enum: [ color, grey ]
                example: grey
              themes:
                type: string
                description: Themen-Kenner im Format `kanton:thema`
                example: "nw:oereb"
              layers:
                type: array
                description: Layer-Zustände des Bookmarks
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    visible:
                      type: boolean
                    opacity:
                      type: number
                      nullable: true
                    order:
                      type: integer
                      nullable: true
                    filter:
                      type: string
                      nullable: true
              serviceGroups:
                type: array
                description: "Nur vorhanden wenn `hierarchy=1`. Fasst Layer nach den ersten 2 Pfad-Segmenten ihrer ID zusammen."
                items:
                  type: object
                  properties:
                    svc:
                      type: string
                      description: Dienst-Kenner (erste 2 Pfad-Segmente der Layer-ID)
                      example: gis_oereb/nw_nutzungsplanung_def
                    layerIds:
                      type: array
                      items:
                        type: string
                    opacity:
                      type: number
                      nullable: true
                      description: Erste non-null opacity der Gruppe
              meta:
                type: object
                properties:
                  schemaVersion:
                    type: integer
                    example: 2
              views:
                type: array
                description: Vordefinierte Kartenansichten innerhalb des Bookmarks
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    isDefault:
                      type: boolean
                    layerStates:
                      type: object
                      additionalProperties:
                        type: object
                        properties:
                          visible:
                            type: boolean

    # === Info ===
    InfoResponse:
      allOf:
      - $ref: "#/components/schemas/SuccessResponse"
      - type: object
        properties:
          data:
            type: object
            properties:
              api:
                type: object
                properties:
                  name:
                    type: string
                  version:
                    type: string
              endpoints:
                type: array
                items:
                  type: object
                  properties:
                    path:
                      type: string
                    description:
                      type: string
                    parameters:
                      type: array
                      items:
                        type: string
              server:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  php:
                    type: string
                  groups:
                    type: array
                    items:
                      type: string
                  layerFiles:
                    type: integer
                  layerDefinitions:
                    type: integer
                  basemaps:
                    type: integer

    # === Service- und Layermanager Schemas ===
    AgsServicesResponse:
      allOf:
      - $ref: "#/components/schemas/SuccessResponse"
      - type: object
        properties:
          data:
            type: object
            properties:
              dienstnamen:
                type: array
                description: "Liste der verfügbaren ArcGIS Server-Dienste"
                items:
                  type: string
                  example: awu/AWU_EIGENTUM

    AgsListRawResponse:
      allOf:
      - $ref: "#/components/schemas/SuccessResponse"
      - type: object
        properties:
          data:
            type: object
            properties:
              exists:
                type: boolean
                description: "true wenn data/tmp/raw-conf existiert"
              directory:
                type: string
                example: /data/Client_Data/nwow/tmp/raw-conf
              includeBackups:
                type: boolean
                description: "true wenn Backups in der Liste enthalten sind"
              backupOnly:
                type: boolean
                description: "true wenn nur Backup-Dateien gelistet sind"
              services:
                type: array
                description: "Dateien gruppiert nach Service-Key"
                items:
                  $ref: "#/components/schemas/AgsServiceGroup"
              files:
                type: array
                description: "Flache Liste aller Dateien"
                items:
                  $ref: "#/components/schemas/AgsFileInfo"

    AgsServiceGroup:
      type: object
      properties:
        service:
          type: string
          description: "Service-Key (z.B. awu/AWU_EIGENTUM)"
          example: awu/AWU_EIGENTUM
        totalSize:
          type: integer
          description: "Gesamtgrösse aller Dateien in Bytes"
          example: 8234
        files:
          type: array
          items:
            $ref: "#/components/schemas/AgsFileInfo"

    AgsFileInfo:
      type: object
      properties:
        file:
          type: string
          description: "Relativer Pfad innerhalb data/tmp/raw-conf/"
          example: awu/AWU_EIGENTUM/layers_TNET_awu_AWU_EIGENTUM.conf
        size:
          type: integer
          example: 4567
        modified:
          type: string
          example: "2025-01-15 10:30:00"
        isBackup:
          type: boolean
          description: "true wenn Datei ein Backup (*.bak) ist"
          example: false

    AgsReadRawResponse:
      allOf:
      - $ref: "#/components/schemas/SuccessResponse"
      - type: object
        properties:
          data:
            type: object
            properties:
              file:
                type: string
                example: awu/AWU_EIGENTUM/layers_TNET_awu_AWU_EIGENTUM.conf
              content:
                type: string
                description: "Dateiinhalt als Text"
              size:
                type: integer
                example: 4567

    AgsExportRequest:
      type: object
      required: [ dienstnamen ]
      properties:
        dienstnamen:
          type: array
          description: "Liste der zu importierenden Service-Namen"
          items:
            type: string
          example: [ "awu/AWU_EIGENTUM", "awu/AWU_WERKPLAN" ]

    AgsDeleteRequest:
      type: object
      required: [ service ]
      properties:
        service:
          type: string
          description: "Service-Key zum Löschen (z.B. awu/AWU_EIGENTUM)"
          example: awu/AWU_EIGENTUM

    AgsExportResponse:
      allOf:
      - $ref: "#/components/schemas/SuccessResponse"
      - type: object
        properties:
          data:
            type: object
            properties:
              success:
                type: boolean
              services:
                type: array
                items:
                  type: string
              zipSize:
                type: integer
                description: "Grösse des empfangenen ZIP in Bytes"
              files:
                type: array
                description: "Liste der extrahierten Dateien"
                items:
                  type: object
                  properties:
                    file:
                      type: string
                    bytes:
                      type: integer
              directory:
                type: string
              timestamp:
                type: string

    AgsDeleteResponse:
      allOf:
      - $ref: "#/components/schemas/SuccessResponse"
      - type: object
        properties:
          data:
            type: object
            properties:
              success:
                type: boolean
              service:
                type: string
                example: awu/AWU_EIGENTUM
              deleted:
                type: array
                description: "Liste der gelöschten Dateien"
                items:
                  type: string
              count:
                type: integer
                description: "Anzahl gelöschter Dateien"

    LegendJsonResponse:
      type: object
      description: |
        JSON-Antwort des Legend-Proxy.
        Enthält alle Layer des Dienstes mit ihren Symbolen als Base64-Bilder.
      properties:
        service:
          type: string
          example: ewn/EWN_NIS/MapServer
        requestedSize:
          type: object
          properties:
            width:
              type: integer
              example: 80
            height:
              type: integer
              example: 160
        layerCount:
          type: integer
          example: 69
        symbolCount:
          type: integer
          example: 1019
        layers:
          type: array
          items:
            type: object
            properties:
              layerId:
                type: integer
                example: 0
              layerName:
                type: string
                example: Trassee Elektro
              symbolCount:
                type: integer
                example: 5
              symbols:
                type: array
                items:
                  type: object
                  properties:
                    label:
                      type: string
                      example: "110kV"
                    width:
                      type: integer
                      description: Tatsächliche Breite des gelieferten Symbols (kann von requestedSize abweichen)
                      example: 106
                    height:
                      type: integer
                      description: Tatsächliche Höhe des gelieferten Symbols
                      example: 20
                    contentType:
                      type: string
                      example: image/png
                    imageData:
                      type: string
                      description: Base64-kodierte Bilddaten
                      example: "iVBORw0KGgo..."

    # === Staging Schemas ===
    StagingMergeRequest:
      type: object
      required: [ services, kuerzel ]
      properties:
        services:
          type: array
          description: "Zu mergende Service-Keys aus raw-conf"
          items:
            type: string
          example: [ "ewn/ewn_EWN_NIS", "ewn/ewn_EWN_NIS_gwr" ]
        kuerzel:
          type: string
          description: "Ziel-Kürzel für die Ausgabe (z.B. ewn, nodi_ch)"
          example: ewn
        mode:
          type: string
          description: |
            Merge-Modus:
            - `merge`: Bestehende ImportToCore-Datei als Basis, neue Keys darüber (Standard)
            - `replace`: Alles komplett neu aufbauen, bestehende Ausgabe wird überschrieben
            - `preview`: Dry-Run — nur Diff-Statistik berechnen, nichts schreiben
          enum: [ merge, replace, preview ]
          default: replace
          example: merge

    StagingMergeResponse:
      type: object
      properties:
        success:
          type: boolean
        kuerzel:
          type: string
          example: ewn
        mode:
          type: string
          enum: [ merge, replace, preview ]
          example: merge
        files:
          type: array
          description: "Geschriebene/berechnete Ausgabedateien"
          items:
            type: object
            properties:
              file:
                type: string
                example: "ewn/layers_ewn.conf"
              bytes:
                type: integer
                description: "0 bei preview"
              keys:
                type: integer
                description: "Gesamtzahl der Keys in der Ausgabe"
              mergeStats:
                type: object
                description: "Diff-Statistik (nur bei merge/preview)"
                properties:
                  added:
                    type: integer
                    description: "Neue Keys hinzugefügt"
                  updated:
                    type: integer
                    description: "Bestehende Keys aktualisiert (Wert geändert)"
                  unchanged:
                    type: integer
                    description: "Keys unverändert"
              preview:
                type: boolean
                description: "true bei mode=preview"
        mergeStats:
          type: object
          description: "Aggregierte Statistik pro Bucket-Prefix"
          additionalProperties:
            type: object
            properties:
              added:
                type: integer
              updated:
                type: integer
              unchanged:
                type: integer
        duplicates:
          type: array
          description: "Intra-Quell-Duplikate (gleicher Key in verschiedenen Quelldateien)"
          items:
            type: object
            properties:
              file:
                type: string
              keys:
                type: array
                items:
                  type: object
                  properties:
                    key:
                      type: string
                    count:
                      type: integer
                    sources:
                      type: array
                      items:
                        type: string
              count:
                type: integer
        errors:
          type: array
          items:
            type: string
        timestamp:
          type: string
          example: "2026-03-01 14:30:00"

    StagingManifest:
      type: object
      description: |
        Staging-Manifest (`.staging-manifest.json`) — trackt welche Services in eine
        ImportToCore-Ausgabe eingeflossen sind. Wird bei merge kumulativ ergänzt.
      properties:
        kuerzel:
          type: string
          example: ewn
        lastStaged:
          type: string
          description: "ISO 8601 Zeitstempel"
          example: "2026-03-01T14:30:00"
        mode:
          type: string
          description: "Modus der letzten Staging-Operation"
          enum: [ merge, replace ]
        sources:
          type: array
          description: "Alle Services die in diese Ausgabe eingeflossen sind"
          items:
            type: object
            properties:
              service:
                type: string
                example: "ewn/ewn_EWN_NIS"
              staged:
                type: string
                description: "Zeitpunkt an dem dieser Service gestagete wurde"
                example: "2026-03-01T14:30:00"
              keys:
                type: object
                description: "Key-Counts pro Bucket-Prefix"
                additionalProperties:
                  type: integer
                example:
                  layers: 45
                  maptips: 90
        buckets:
          type: object
          description: "Ausgabedateien pro Prefix"
          additionalProperties:
            type: object
            properties:
              file:
                type: string
                example: "layers_ewn.conf"
              totalKeys:
                type: integer
                example: 57
