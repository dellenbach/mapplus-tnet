        // Highlight-Geometrien auf der 3D-Szene anzeigen
        function showHighlightGraphics(features) {
            if (!highlightGraphicsLayer) return;
            clearHighlight();
            
            require([
                'esri/Graphic',
                'esri/geometry/Point',
                'esri/geometry/Polyline',
                'esri/geometry/Polygon',
                'esri/geometry/SpatialReference',
                'esri/geometry/projection',
                'esri/symbols/SimpleMarkerSymbol',
                'esri/symbols/SimpleLineSymbol',
                'esri/symbols/SimpleFillSymbol'
            ], function(Graphic, Point, Polyline, Polygon, SpatialReference, projection, SimpleMarkerSymbol, SimpleLineSymbol, SimpleFillSymbol) {
                
                // Highlight-Styling: Config oder Defaults (kräftiges Grün)
                var hl = _highlightConfig || {};
                var hlLine = hl.line || {};
                var hlFill = hl.fill || {};
                var hlPoint = hl.point || {};
                
                var highlightLine = new SimpleLineSymbol({
                    color: hlLine.color || [0, 200, 60, 0.95],
                    width: hlLine.width || 5
                });
                var highlightFill = new SimpleFillSymbol({
                    color: hlFill.color || [0, 200, 60, 0.30],
                    outline: {
                        color: hlFill.outlineColor || [0, 200, 60, 0.95],
                        width: hlFill.outlineWidth || 5
                    }
                });
                var highlightPoint = new SimpleMarkerSymbol({
                    color: hlPoint.color || [0, 200, 60, 0.85],
                    size: hlPoint.size || 16,
                    outline: {
                        color: hlPoint.outlineColor || [0, 140, 40, 1],
                        width: hlPoint.outlineWidth || 3
                    }
                });
                
                // Projection Engine laden, dann Geometrien verarbeiten
                projection.load().then(function() {
                    var viewSR = sceneView.spatialReference || SpatialReference.WGS84;
                    
                    // CH1903+/LV95 (EPSG:2056) → WGS84 Näherungstransformation
                    // Genauigkeit: ~1m, ausreichend für Highlight-Darstellung
                    function lv95ToWgs84(east, north) {
                        var y_aux = (east - 2600000) / 1000000;
                        var x_aux = (north - 1200000) / 1000000;
                        var lon = 2.6779094 + 4.728982 * y_aux + 0.791484 * y_aux * x_aux + 0.1306 * y_aux * x_aux * x_aux - 0.0436 * y_aux * y_aux * y_aux;
                        var lat = 16.9023892 + 3.238272 * x_aux - 0.270978 * y_aux * y_aux - 0.002528 * x_aux * x_aux - 0.0447 * y_aux * y_aux * x_aux - 0.0140 * x_aux * x_aux * x_aux;
                        return { lon: lon * 100 / 36, lat: lat * 100 / 36 };
                    }
                    
                    function transformCoords2056ToWgs84(coords) {
                        if (!coords || coords.length === 0) return coords;
                        // Prüfe ob es geschachtelte Arrays sind (Ringe/Pfade)
                        if (Array.isArray(coords[0]) && Array.isArray(coords[0][0])) {
                            return coords.map(function(ring) { return transformCoords2056ToWgs84(ring); });
                        }
                        if (Array.isArray(coords[0])) {
                            return coords.map(function(c) {
                                var wgs = lv95ToWgs84(c[0], c[1]);
                                return [wgs.lon, wgs.lat];
                            });
                        }
                        // Einzelpunkt [x, y]
                        var wgs = lv95ToWgs84(coords[0], coords[1]);
                        return [wgs.lon, wgs.lat];
                    }
                    
                    function projectToView(esriGeom) {
                        // Geometrie in SceneView-SR projizieren falls nötig
                        if (!esriGeom || !esriGeom.spatialReference) return esriGeom;
                        if (esriGeom.spatialReference.wkid === viewSR.wkid) return esriGeom;
                        try {
                            var projected = projection.project(esriGeom, viewSR);
                            if (projected) return projected;
                        } catch(e) {
                            // Fallback: manuelle Transformation
                        }
                        // Fallback für EPSG:2056 → WGS84
                        if (esriGeom.spatialReference.wkid === 2056) {
                            try {
                                if (esriGeom.type === 'point') {
                                    var wgs = lv95ToWgs84(esriGeom.x, esriGeom.y);
                                    return new Point({ x: wgs.lon, y: wgs.lat, spatialReference: SpatialReference.WGS84 });
                                } else if (esriGeom.type === 'polyline') {
                                    var newPaths = esriGeom.paths.map(function(path) {
                                        return path.map(function(c) { var w = lv95ToWgs84(c[0], c[1]); return [w.lon, w.lat]; });
                                    });
                                    return new Polyline({ paths: newPaths, spatialReference: SpatialReference.WGS84 });
                                } else if (esriGeom.type === 'polygon') {
                                    var newRings = esriGeom.rings.map(function(ring) {
                                        return ring.map(function(c) { var w = lv95ToWgs84(c[0], c[1]); return [w.lon, w.lat]; });
                                    });
                                    return new Polygon({ rings: newRings, spatialReference: SpatialReference.WGS84 });
                                }
                            } catch(e2) {
                                console.warn('[3DViewer] LV95→WGS84 fallback error:', e2);
                            }
                        }
                        return esriGeom;
                    }
                    
                    function addGraphic(esriGeom, symbol) {
                        if (!esriGeom || !symbol) return;
                        var projected = projectToView(esriGeom);
                        highlightGraphicsLayer.add(new Graphic({ geometry: projected, symbol: symbol }));
                    }
                    
                    features.forEach(function(item) {
                        item.data.forEach(function(feat) {
                            var geom = feat.geometry;
                            var esriGeom = null;
                            var symbol = null;
                            
                            // Keine Geometrie → ESRI-nativer Highlight (SceneLayer/BuildingSceneLayer)
                            if (!geom && feat._graphic && feat._layer) {
                                sceneView.whenLayerView(feat._layer).then(function(layerView) {
                                    if (layerView && typeof layerView.highlight === 'function') {
                                        var handle = layerView.highlight(feat._graphic);
                                        _nativeHighlightHandles.push(handle);
                                        console.log('[3DViewer] Native highlight on:', feat._layer.title);
                                    }
                                }).catch(function(e) {
                                    console.warn('[3DViewer] Native highlight failed:', e);
                                });
                                return;
                            }
                            if (!geom) return;
                            var esriGeom = null;
                            var symbol = null;
                            
                            try {
                                // ESRI-Geometrie-Objekt (von hitTest oder direkt)
                                if (geom.type === 'polygon' || geom.type === 'polyline' ||
                                    geom.type === 'point' || geom.type === 'multipoint') {
                                    esriGeom = geom;
                                    if (geom.type === 'polygon') symbol = highlightFill;
                                    else if (geom.type === 'polyline') symbol = highlightLine;
                                    else symbol = highlightPoint;
                                }
                                // GeoJSON-Format (von WMS GetFeatureInfo)
                                else if (geom.type && geom.coordinates) {
                                    var sr = feat.geometrySr ? new SpatialReference({ wkid: feat.geometrySr }) : SpatialReference.WGS84;
                                    
                                    if (geom.type === 'Point') {
                                        esriGeom = new Point({ x: geom.coordinates[0], y: geom.coordinates[1], spatialReference: sr });
                                        symbol = highlightPoint;
                                    } else if (geom.type === 'MultiPoint') {
                                        geom.coordinates.forEach(function(c) {
                                            addGraphic(new Point({ x: c[0], y: c[1], spatialReference: sr }), highlightPoint);
                                        });
                                        return;
                                    } else if (geom.type === 'LineString') {
                                        esriGeom = new Polyline({ paths: [geom.coordinates], spatialReference: sr });
                                        symbol = highlightLine;
                                    } else if (geom.type === 'MultiLineString') {
                                        esriGeom = new Polyline({ paths: geom.coordinates, spatialReference: sr });
                                        symbol = highlightLine;
                                    } else if (geom.type === 'Polygon') {
                                        esriGeom = new Polygon({ rings: geom.coordinates, spatialReference: sr });
                                        symbol = highlightFill;
                                    } else if (geom.type === 'MultiPolygon') {
                                        var allRings = [];
                                        geom.coordinates.forEach(function(poly) {
                                            poly.forEach(function(ring) { allRings.push(ring); });
                                        });
                                        esriGeom = new Polygon({ rings: allRings, spatialReference: sr });
                                        symbol = highlightFill;
                                    }
                                }
                                // ESRI JSON-Format (von ArcGIS Identify: rings/paths/x,y)
                                else {
                                    var sr2 = feat.geometrySr ? new SpatialReference({ wkid: feat.geometrySr }) : SpatialReference.WGS84;
                                    if (geom.rings) {
                                        esriGeom = new Polygon({ rings: geom.rings, spatialReference: sr2 });
                                        symbol = highlightFill;
                                    } else if (geom.paths) {
                                        esriGeom = new Polyline({ paths: geom.paths, spatialReference: sr2 });
                                        symbol = highlightLine;
                                    } else if (geom.x !== undefined && geom.y !== undefined) {
                                        esriGeom = new Point({ x: geom.x, y: geom.y, spatialReference: sr2 });
                                        symbol = highlightPoint;
                                    }
                                }
                                
                                addGraphic(esriGeom, symbol);
                            } catch(e) {
                                console.warn('[3DViewer] Highlight error:', e);
                            }
                        });
                    });
                }).catch(function(err) {
                    console.warn('[3DViewer] Highlight projection engine error:', err);
                });
            });
        }
        
        // Initialize the 3D scene
        function initScene(wsId) {
            webSceneId = wsId;
            console.log('[3DViewer] Initializing:', webSceneId);
            setLoadingStatus('Lade ESRI Module...');
            
            // Destroy existing view if reinitializing
            if (sceneView) {
                deactivateAllTools();
                try { sceneView.destroy(); } catch(e) {}
                sceneView = null;
            }
            overlayLayers = [];
            basemapOverlayLayers = [];
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('error-overlay').style.display = 'none';
            
            require([
                'esri/WebScene',
                'esri/Map',
                'esri/views/SceneView',
                'esri/widgets/Home',
                'esri/widgets/NavigationToggle',
                'esri/widgets/Zoom',
                'esri/Basemap'
            ], function(WebScene, Map, SceneView, Home, NavigationToggle, Zoom, Basemap) {
                
                console.log('[3DViewer] ESRI modules loaded');
                
                try {
                    var mapOrScene;
                    
                    if (webSceneId === '__terrain__') {
                        // Simple terrain scene - basemap from 2D will be overlaid
                        setLoadingStatus('Erstelle Terrain-Ansicht...');
                        mapOrScene = new Map({
                            basemap: 'satellite',  // Fallback if no 2D basemap synced
                            ground: 'world-elevation'
                        });
                    } else {
                        setLoadingStatus('Lade WebScene...');
                        mapOrScene = new WebScene({
                            portalItem: {
                                id: webSceneId
                            }
                        });
                    }
                    
                    // Parse initial position from URL params
                    var params = getParams();
                    var initLon = parseFloat(params.lon) || 8.36;
                    var initLat = parseFloat(params.lat) || 46.95;
                    var initZoom = parseFloat(params.zoom) || 14;
                    var initAlt = parseFloat(params.altitude) || 800; // Fallback: ~600m Terrain + 200m
                    var initHeading = parseFloat(params.heading) || 0;
                    var initTilt = parseFloat(params.tilt) || 60;
                    
                    sceneView = new SceneView({
                        container: 'sceneViewDiv',
                        map: mapOrScene,
                        qualityProfile: params.quality || 'high',
                        camera: {
                            position: {
                                longitude: initLon,
                                latitude: initLat,
                                z: initAlt
                            },
                            heading: initHeading,
                            tilt: initTilt
                        },
                        environment: {
                            background: {
                                type: 'color',
                                color: [200, 220, 240, 1]
                            },
                            lighting: {
                                type: 'virtual',
                                directShadowsEnabled: true,
                                ambientOcclusionEnabled: true
                            },
                            atmosphere: {
                                quality: 'high'
                            },
                            starsEnabled: false
                        },
                        popup: {
                            defaultPopupTemplateEnabled: true
                        },
                        highlightOptions: {
                            color: [0, 255, 0, 1],
                            haloColor: [0, 220, 0, 1],
                            haloOpacity: 0.9,
                            fillOpacity: 0.35
                        }
                    });
                    
                    sceneView.when(function() {
                        console.log('[3DViewer] SceneView loaded successfully');
                        console.log('[3DViewer] Camera:', sceneView.camera.position.longitude, sceneView.camera.position.latitude);
                        
                        setLoadingStatus('Bereit.');
                        hideLoading();
                        
                        // Add Home widget
                        var homeWidget = new Home({ view: sceneView });
                        sceneView.ui.add(homeWidget, 'top-left');
                        
                        // Notify parent
                        sendToParent({ type: 'ready' });
                        
                        // Setup 3D Maptips (click-to-identify)
                        setup3DMaptips();
                        
                        // Watch camera changes and send to parent for sync
                        // Throttled: max 20 Updates/sec statt 60 (ESRI feuert bei jedem Frame)
                        var _camThrottleTimer = null;
                        var _lastCamSend = 0;
                        var CAM_THROTTLE_MS = 50;
                        
                        sceneView.watch('camera', function(cam) {
                            if (syncLock || !syncEnabled) return;
                            
                            var now = Date.now();
                            var camMsg = {
                                type: 'cameraChanged',
                                longitude: cam.position.longitude,
                                latitude: cam.position.latitude,
                                altitude: cam.position.z,
                                heading: cam.heading,
                                tilt: cam.tilt,
                                fov: cam.fov || 55,
                                zoom: sceneView.zoom
                            };
                            
                            if (now - _lastCamSend < CAM_THROTTLE_MS) {
                                // Debounce: letztes Update nachholen nach Throttle-Ende
                                if (_camThrottleTimer) clearTimeout(_camThrottleTimer);
                                _camThrottleTimer = setTimeout(function() {
                                    _camThrottleTimer = null;
                                    if (syncLock || !syncEnabled) return;
                                    _lastCamSend = Date.now();
                                    var c = sceneView.camera;
                                    sendToParent({
                                        type: 'cameraChanged',
                                        longitude: c.position.longitude,
                                        latitude: c.position.latitude,
                                        altitude: c.position.z,
                                        heading: c.heading,
                                        tilt: c.tilt,
                                        fov: c.fov || 55,
                                        zoom: sceneView.zoom
                                    });
                                }, CAM_THROTTLE_MS);
                                return;
                            }
                            
                            _lastCamSend = now;
                            sendToParent(camMsg);
                        });
                        
                    }, function(err) {
                        console.error('[3DViewer] SceneView error:', err);
                        showError('3D-Ansicht konnte nicht geladen werden: ' + (err.message || err));
                        sendToParent({ type: 'error', message: err.message || 'SceneView load error' });
                    });
                    
                    // Also log webscene loading (only for WebScene, not for plain Map)
                    if (mapOrScene.portalItem) {
                        mapOrScene.when(function() {
                            console.log('[3DViewer] WebScene loaded:', mapOrScene.portalItem.title);
                            setLoadingStatus('WebScene geladen, rendere 3D...');
                        }, function(err) {
                            console.error('[3DViewer] WebScene error:', err);
                            showError('WebScene konnte nicht geladen werden.\n\nWebScene ID: ' + webSceneId + '\n\n' + (err.message || err));
                            sendToParent({ type: 'error', message: err.message || 'WebScene load error' });
                        });
                    }
                    
                } catch(err) {
                    console.error('[3DViewer] Init error:', err);
                    showError('Initialisierungsfehler: ' + err.message);
                }
            });
        }
        
        // Start
        var params = getParams();
        var wsId = params.webscene || params.id;
        
        if (!wsId) {
            showError('Keine WebScene ID angegeben. Bitte ?webscene=ID in der URL angeben.');
        } else {
            initScene(wsId);
        }
    </script>
</body>
</html>
