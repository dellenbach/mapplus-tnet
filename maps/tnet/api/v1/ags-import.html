<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGS Import — TNET API</title>
<style>
/**
 * ags-import.html
 * Eigenständige Seite für ArcGIS Server → MapPlus Roh-Konfiguration Import & Verwaltung
 *
 * @version    1.0
 * @date       2026-02-26
 * @copyright  Trigonet AG
 * @author     Marco Dellenbach
 */

* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --c-bg: #f0f2f5; --c-panel: #fff; --c-border: #ddd;
  --c-primary: #648C96; --c-accent: #e8423f; --c-dark: #1e3a4a;
  --c-text: #333; --c-muted: #888; --c-hover: #f5f8fa;
  --radius: 6px; --shadow: 0 1px 4px rgba(0,0,0,.08);
}
html, body { height: 100%; margin: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--c-bg); color: var(--c-text); font-size: 13px;
  display: flex; flex-direction: column;
}

/* ===== TOOLBAR ===== */
.ags-toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 0 14px; height: 42px; min-height: 42px;
  background: var(--c-dark); color: #fff; font-size: 12px;
  user-select: none;
}
.ags-toolbar .brand { font-weight: 700; font-size: 14px; letter-spacing: .3px; }
.ags-toolbar .sep { width: 1px; height: 20px; background: rgba(255,255,255,.15); margin: 0 4px; }
.ags-toolbar .spacer { flex: 1; }
.ags-toolbar button {
  padding: 4px 12px; font-size: 11px; border: 1px solid rgba(255,255,255,.2);
  border-radius: 3px; background: rgba(255,255,255,.08); color: #fff;
  cursor: pointer; font-weight: 500;
}
.ags-toolbar button:hover { background: rgba(255,255,255,.18); }
.ags-toolbar a {
  color: rgba(255,255,255,.5); font-size: 11px; text-decoration: none;
}
.ags-toolbar a:hover { color: rgba(255,255,255,.8); }

/* ===== MAIN LAYOUT ===== */
.ags-main {
  flex: 1; display: flex; flex-direction: column;
  max-width: 1280px; width: 100%; margin: 0 auto;
  padding: 20px 24px; overflow: hidden;
}

/* ===== TABS (Prozesskette / Chevron) ===== */
.ags-tabs {
  display: flex; gap: 4px; margin-bottom: 16px; user-select: none;
}
.ags-tab {
  padding: 9px 18px 9px 26px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; color: #fff; white-space: nowrap;
  clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%, 14px 50%);
  transition: opacity .2s, filter .2s;
  opacity: 0.4; filter: grayscale(0.3);
}
.ags-tab:first-of-type {
  padding-left: 16px;
  clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%);
  border-radius: 4px 0 0 4px;
}
.ags-tab[data-tab="import"]  { background: linear-gradient(135deg, #7cb342, #558b2f); }
.ags-tab[data-tab="manage"]  { background: linear-gradient(135deg, #5ba4b5, #3d8a9a); }
.ags-tab[data-tab="staging"] { background: linear-gradient(135deg, #e0a430, #c68d20); }
.ags-tab.active { opacity: 1; filter: none; }
.ags-tab:hover:not(.active) { opacity: 0.65; filter: grayscale(0.1); }

/* ===== TAB PANES ===== */
.ags-pane { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.ags-pane.active { display: flex; }

/* ===== STATUS ===== */
.ags-status {
  padding: 8px 12px; font-size: 12px; color: #666;
  background: #f5f7fa; border-radius: 4px; margin-bottom: 12px;
  flex-shrink: 0;
}
.ags-status.error { background: #fef0f0; color: #c33; }
.ags-status.success { background: #edf9f0; color: #2a8; }

/* ===== FILTER ===== */
.ags-filter {
  width: 100%; padding: 7px 10px; font-size: 12px;
  border: 1px solid #ccc; border-radius: 4px; margin-bottom: 8px;
  box-sizing: border-box; flex-shrink: 0;
}

/* ===== SELECT BAR ===== */
.ags-select-bar {
  display: flex; gap: 6px; margin-bottom: 8px;
  align-items: center; flex-shrink: 0;
}
.ags-select-bar button {
  padding: 3px 10px; font-size: 11px; border: 1px solid #ccc;
  border-radius: 3px; background: #f8f8f8; cursor: pointer;
}
.ags-select-bar button:hover { background: #eee; }
.ags-select-bar .sel-info { font-size: 11px; color: #888; margin-left: auto; }

/* ===== CHECKBOX-LISTE ===== */
.ags-list {
  flex: 1; overflow-y: auto; border: 1px solid #e0e4e8;
  border-radius: 4px; margin-bottom: 12px; min-height: 120px;
}
.ags-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 10px;
  font-size: 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer;
  user-select: none;
}
.ags-item:last-child { border-bottom: none; }
.ags-item:hover { background: #f0f7f8; }
.ags-item input[type=checkbox] { flex-shrink: 0; cursor: pointer; }
.ags-item .ags-name { flex: 1; font-family: 'Consolas', monospace; word-break: break-all; }
.ags-item.hidden { display: none; }
.ags-item.imported { background: #f0faf3; }
.ags-item.imported .ags-name { color: #27ae60; }
.ags-imported-badge { font-size: 10px; background: #27ae60; color: #fff; border-radius: 3px; padding: 1px 5px; flex-shrink: 0; font-family: sans-serif; }
.ags-import-legend { display: flex; gap: 14px; align-items: center; font-size: 11px; color: #666; padding: 5px 10px; background: #f5f7fa; border-radius: 4px; margin-bottom: 6px; border: 1px solid #e8eaed; }
.ags-import-legend .leg-item { display: flex; align-items: center; gap: 5px; }
.leg-dot-new { width: 10px; height: 10px; border-radius: 2px; background: #fff; border: 1px solid #bbb; flex-shrink: 0; }
.leg-dot-imp { width: 10px; height: 10px; border-radius: 2px; background: #27ae60; flex-shrink: 0; }

/* ===== ACTIONS BAR ===== */
.ags-actions {
  display: flex; gap: 8px; align-items: center; padding-top: 8px;
  border-top: 1px solid #eee; flex-shrink: 0;
}
.ags-actions .spacer { flex: 1; }
.ags-actions button {
  padding: 7px 18px; font-size: 12px; border: 1px solid #ddd;
  border-radius: 4px; cursor: pointer; font-weight: 600;
}
.ags-actions button.primary {
  background: var(--c-accent); color: #fff; border-color: var(--c-accent);
}
.ags-actions button.primary:hover { background: #c9362f; }
.ags-actions button.primary:disabled { opacity: .4; cursor: default; }
.ags-actions button.danger {
  background: #fff; color: #c33; border-color: #daa;
}
.ags-actions button.danger:hover { background: #fef0f0; border-color: #c33; }
.ags-actions button.danger:disabled { opacity: .4; cursor: default; color: #999; border-color: #ddd; }
.ags-actions button.secondary {
  background: #fff; color: #555; border-color: #ccc;
}
.ags-actions button.secondary:hover { background: #f5f5f5; }
.ags-actions button.secondary:disabled { opacity: .4; cursor: default; color: #999; border-color: #ddd; }
.ags-selcount { font-size: 11px; color: #888; }

/* ===== PROGRESS ===== */
.ags-progress {
  display: none; align-items: center; gap: 8px; padding: 12px;
  background: #f5f7fa; border-radius: 4px; margin-bottom: 12px;
  flex-shrink: 0;
}
.ags-progress.active { display: flex; }
.ags-spinner {
  width: 18px; height: 18px; border: 2px solid #ddd;
  border-top-color: var(--c-accent); border-radius: 50%;
  animation: ags-spin .8s linear infinite;
}
@keyframes ags-spin { to { transform: rotate(360deg); } }

/* ===== RESULT ===== */
.ags-result { margin-top: 12px; flex-shrink: 0; max-height: 260px; overflow-y: auto; border: 1px solid #e8eaed; border-radius: 4px; padding: 6px; }
.ags-result-file {
  display: flex; align-items: center; gap: 6px; padding: 3px 0;
  font-size: 11px; color: #555;
}
.ags-result-file .rf-icon { color: #2a8; }
.ags-result-file .rf-name { flex: 1; font-family: 'Consolas', monospace; }
.ags-result-file .rf-size { color: #999; font-size: 10px; }

/* ===== VERWALTEN-TAB: SERVICE-GRUPPEN ===== */
.ags-svc-list { flex: 1; overflow-y: auto; min-height: 120px; }
.ags-svc-group {
  border: 1px solid #e0e4e8; border-radius: 4px; margin-bottom: 6px; overflow: hidden;
}
.ags-svc-head {
  display: flex; align-items: center; gap: 8px; padding: 7px 10px;
  background: #f5f7fa; cursor: pointer; user-select: none; font-size: 12px;
}
.ags-svc-head:hover { background: #eef2f4; }
.ags-svc-head input[type=checkbox] { flex-shrink: 0; cursor: pointer; }
.ags-svc-head .svc-arrow { display: inline-block; transition: transform .15s; font-size: 10px; color: #888; width: 12px; }
.ags-svc-group.open .svc-arrow { transform: rotate(90deg); }
.ags-svc-head .svc-name { flex: 1; font-family: 'Consolas', monospace; font-weight: 600; }
.ags-svc-head .svc-badge { font-size: 9px; color: #fff; background: var(--c-primary); padding: 1px 6px; border-radius: 7px; }
.ags-svc-head .svc-size { font-size: 10px; color: #999; }
.ags-svc-head .svc-del {
  padding: 2px 8px; font-size: 10px; border: 1px solid #ddd; border-radius: 3px;
  background: #fff; cursor: pointer; color: #c33;
}
.ags-svc-head .svc-del:hover { background: #fef0f0; border-color: #c33; }
.ags-svc-files { padding: 2px 10px 6px 54px; display: none; }
.ags-svc-group.open .ags-svc-files { display: block; }
.ags-svc-file { font-size: 11px; color: #666; padding: 2px 0; display: flex; gap: 8px; }
.ags-svc-file .sf-name { flex: 1; font-family: 'Consolas', monospace; }
.ags-svc-file .sf-size { color: #aaa; font-size: 10px; }
.ags-svc-file .sf-date { color: #aaa; font-size: 10px; }
.ags-svc-file .sf-edit {
  padding: 1px 6px; font-size: 10px; border: 1px solid #ccc; border-radius: 3px;
  background: #fff; cursor: pointer; color: #648C96; flex-shrink: 0;
}
.ags-svc-file .sf-edit:hover { background: #eef5f6; border-color: #648C96; }

/* ===== DATEI-EDITOR-MODAL ===== */
#file-editor-overlay {
  display: none; position: fixed; inset: 0; z-index: 10000;
  background: rgba(0,0,0,.45); align-items: center; justify-content: center;
}
#file-editor-overlay.open { display: flex; }
#file-editor-dialog {
  background: #fff; border-radius: 6px; box-shadow: 0 8px 32px rgba(0,0,0,.22);
  width: 92vw; max-width: 960px; height: 80vh;
  display: flex; flex-direction: column; overflow: hidden;
}
#file-editor-header {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border-bottom: 1px solid #e0e4e8; background: #f5f7fa; flex-shrink: 0;
}
#file-editor-header .fe-filename {
  flex: 1; font-family: 'Consolas', monospace; font-size: 12px;
  font-weight: 700; color: #1e3a4a; word-break: break-all;
}
#file-editor-header .fe-close {
  padding: 4px 10px; font-size: 11px; border: 1px solid #ccc;
  border-radius: 3px; background: #fff; cursor: pointer;
}
#file-editor-header .fe-close:hover { background: #fef0f0; color: #c33; border-color: #c33; }
#file-editor-body { flex: 1; overflow: hidden; position: relative; }
.fe-editor-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; }
.fe-line-numbers {
  position: absolute; top: 0; left: 0; bottom: 0; width: 40px;
  padding: 12px 6px 12px 0; background: #252526;
  border-right: 1px solid #3e3e42;
  font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.5;
  color: #858585; text-align: right; overflow: hidden; user-select: none;
  z-index: 3; white-space: pre;
}
.fe-line-numbers .ln-err { color: #f44747; font-weight: bold; }
#file-editor-highlight {
  position: absolute; inset: 0; padding: 12px 12px 12px 52px; margin: 0;
  font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.5;
  background: #1e1e1e; color: #d4d4d4; white-space: pre-wrap; word-wrap: break-word;
  overflow: auto; pointer-events: none; tab-size: 2;
}
#file-editor-textarea {
  position: absolute; inset: 0; padding: 12px 12px 12px 52px;
  font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.5;
  background: transparent; color: transparent; caret-color: #d4d4d4;
  border: none; outline: none; resize: none; tab-size: 2;
  overflow: auto; z-index: 1; white-space: pre-wrap; word-wrap: break-word;
  spellcheck: false;
}
#file-editor-textarea.valid   { box-shadow: inset 0 0 0 2px #27ae60; }
#file-editor-textarea.invalid { box-shadow: inset 0 0 0 2px #c0392b; }
.j-err-line { background: rgba(220,30,30,.28); border-left: 3px solid #e74c3c; display: block; margin-left: -3px; padding-left: 3px; }
.j-err-col  { display: inline-block; width: 0; border-left: 2px solid #e74c3c;
              height: 1.2em; vertical-align: text-bottom; margin: 0 -1px;
              box-shadow: 0 0 4px #e74c3c; }
/* ===== STAGING-TAB ===== */
.staging-kuerzel-row {
  display: flex; align-items: center; gap: 8px; padding: 6px 2px;
  font-size: 12px; flex-shrink: 0; margin-top: 4px;
}
.staging-kuerzel-row label { font-weight: 600; color: #555; white-space: nowrap; }
.staging-kuerzel-row input {
  flex: 1; padding: 5px 8px; font-size: 12px; border: 1px solid #ccc;
  border-radius: 4px; font-family: 'Consolas', monospace;
}
.staging-kuerzel-row input:focus { outline: none; border-color: var(--c-primary); }
/* ===== STAGING SPLIT LAYOUT ===== */
.staging-split  { display: flex; gap: 0; flex: 1; min-height: 0; overflow: hidden; }
.staging-left   { display: flex; flex-direction: column; flex: 0 0 47%; border-right: 1px solid #e0e0e0; padding-right: 8px; overflow: hidden; min-height: 0; }
.staging-right  { display: flex; flex-direction: column; flex: 1; padding-left: 8px; overflow: hidden; min-height: 0; }
.stg-right-head { display: flex; align-items: center; gap: 4px; padding: 1px 0 5px; border-bottom: 1px solid #e8e8e8; flex-shrink: 0; }
.stg-right-head > span { font-size: 11px; font-weight: 700; color: #555; flex: 1; }
.stg-right-head button { font-size: 11px; padding: 2px 6px; border: 1px solid #ccc; border-radius: 3px; background: #f5f5f5; cursor: pointer; }
.stg-right-head button:hover { background: #e8f4f4; }
.stg-output-status { font-size: 11px; color: #888; padding: 3px 0; flex-shrink: 0; }
.stg-output-list   { flex: 1; overflow-y: auto; min-height: 0; margin-top: 2px; }
.stg-output-kuerzel { font-size: 11px; font-weight: 700; color: var(--c-primary); padding: 5px 2px 3px; display: flex; align-items: center; gap: 5px; border-top: 1px solid #e8e8e8; }
.stg-output-kuerzel:first-child { border-top: none; }
.stg-output-kuerzel label { cursor: pointer; flex: 1; margin: 0; font-weight: 700; }
.stg-output-kuerzel input[type=checkbox] { margin: 0; flex-shrink: 0; }
.stg-output-file { display: flex; align-items: center; gap: 4px; padding: 2px 4px 2px 16px; border-radius: 3px; }
.stg-output-file:hover { background: #f0f7f7; }
.stg-output-file .of-name { flex: 1; font-family: 'Consolas', monospace; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.stg-output-file .of-size { color: #bbb; font-size: 10px; flex-shrink: 0; }
.stg-output-file .of-edit { font-size: 10px; padding: 1px 5px; border: 1px solid #ccc; border-radius: 3px; background: transparent; cursor: pointer; color: #555; flex-shrink: 0; opacity: 0.6; }
.stg-output-file .of-edit:hover { opacity: 1; background: #e8f4f4; }
.stg-output-file.has-dups { background: #fef6f0; border-left: 3px solid #e67e22; }
.stg-output-file .of-dup { font-size: 9px; color: #e67e22; font-weight: 700; flex-shrink: 0; cursor: help; }
.stg-output-file.has-cross-dups { background: #fef0f0; border-left: 3px solid #c33; }
.stg-output-file .of-cross-dup { font-size: 9px; color: #c33; font-weight: 700; flex-shrink: 0; cursor: help; }
.stg-dup-detail { font-size: 10px; color: #c33; padding: 3px 4px 3px 20px; background: #fef0f0; border-radius: 3px; margin: 1px 0; font-family: 'Consolas', monospace; word-break: break-all; }
.stg-cross-dup-detail { font-size: 10px; color: #c33; padding: 3px 4px 3px 20px; background: #fce4e4; border-radius: 3px; margin: 1px 0; font-family: 'Consolas', monospace; word-break: break-all; }
.stg-cross-dup-summary { font-size: 11px; color: #c33; font-weight: 700; padding: 6px 8px; margin-bottom: 6px; background: #fce4e4; border: 1px solid #e8a; border-radius: 4px; }
#file-editor-footer {
  display: flex; align-items: center; gap: 8px; padding: 8px 14px;
  border-top: 1px solid #e0e4e8; background: #f5f7fa; flex-shrink: 0;
}
#file-editor-status { flex: 1; font-size: 11px; }
#file-editor-status.ok   { color: #2a8; }
#file-editor-status.err  { color: #c33; }
#file-editor-validate {
  padding: 6px 14px; font-size: 12px; font-weight: 600;
  background: #fff; color: #555; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;
}
#file-editor-validate:hover { background: #f5f5f5; }
#file-editor-save {
  padding: 6px 18px; font-size: 12px; font-weight: 600;
  background: #648C96; color: #fff; border: none; border-radius: 4px; cursor: pointer;
}
#file-editor-save:hover { background: #50737d; }
#file-editor-save:disabled { opacity: .4; cursor: default; }
/* Syntax-Highlighting */
#file-editor-highlight .j-key  { color: #9cdcfe; }
#file-editor-highlight .j-str  { color: #ce9178; }
#file-editor-highlight .j-num  { color: #b5cea8; }
#file-editor-highlight .j-bool { color: #569cd6; }
#file-editor-highlight .j-null { color: #569cd6; }
</style>
</head>
<body>

<!-- ===== TOOLBAR ===== -->
<div class="ags-toolbar">
  <span class="brand">🌐 AGS Import</span>
  <span class="sep"></span>
  <button id="ags-btn-refresh" title="Daten neu laden">↻ Aktualisieren</button>
  <span class="spacer"></span>
  <a href="/maps/tnet/api/v1/tree-builder.html">← Tree-Builder</a>
  <span class="sep"></span>
  <a href="/maps/tnet/api/docs/" target="_blank">API Docs</a>
</div>

<!-- ===== MAIN ===== -->
<div class="ags-main">

  <!-- Tabs -->
  <div class="ags-tabs">
    <button class="ags-tab active" data-tab="import">① Import</button>
    <button class="ags-tab" data-tab="manage">② Verwalten</button>
    <button class="ags-tab" data-tab="staging">③ Staging</button>
  </div>

  <!-- ===== TAB: IMPORT ===== -->
  <div class="ags-pane active" id="pane-import">
    <div class="ags-status" id="import-status">Dienste werden geladen…</div>
    <div class="ags-progress" id="import-progress">
      <div class="ags-spinner"></div>
      <span id="import-progress-text">Export wird verarbeitet…</span>
    </div>
    <input type="text" class="ags-filter" id="import-filter" placeholder="Dienste filtern…" style="display:none">
    <div class="ags-select-bar" id="import-select-bar" style="display:none">
      <button id="import-sel-all">Alle</button>
      <button id="import-sel-none">Keine</button>
      <span class="sel-info" id="import-sel-info">0 ausgewählt</span>
    </div>
    <div class="ags-import-legend" id="import-legend" style="display:none">
      <span class="leg-item"><span class="leg-dot-new"></span> Noch nicht importiert</span>
      <span class="leg-item"><span class="leg-dot-imp"></span> Bereits importiert</span>
    </div>
    <div class="ags-list" id="import-list" style="display:none"></div>
    <div class="ags-result" id="import-result" style="display:none"></div>
    <div class="ags-actions" id="import-actions" style="display:none">
      <span class="ags-selcount" id="import-selcount"></span>
      <span class="spacer"></span>
      <button id="import-btn-export" class="primary" disabled>📦 Exportieren & Speichern</button>
    </div>
  </div>

  <!-- ===== TAB: VERWALTEN ===== -->
  <div class="ags-pane" id="pane-manage">
    <div class="ags-status" id="manage-status">Lade bestehende Konfigurationen…</div>
    <div class="ags-progress" id="manage-progress">
      <div class="ags-spinner"></div>
      <span id="manage-progress-text">Lösche Services…</span>
    </div>
    <input type="text" class="ags-filter" id="manage-filter" placeholder="Services filtern…" style="display:none">
    <div class="ags-select-bar" id="manage-select-bar" style="display:none">
      <select id="manage-backup-filter" style="padding:3px 8px;font-size:11px;border:1px solid #ccc;border-radius:3px;background:#fff">
        <option value="active">Aktive</option>
        <option value="all">Alle</option>
        <option value="backups">Nur Backups</option>
      </select>
      <button id="manage-sel-all">Alle</button>
      <button id="manage-sel-none">Keine</button>
      <span class="sel-info" id="manage-sel-info">0 / 0 ausgewählt</span>
    </div>
    <div class="ags-svc-list" id="manage-svc-list"></div>
    <div class="ags-actions" id="manage-actions" style="display:none">
      <span class="ags-selcount" id="manage-selcount"></span>
      <span class="spacer"></span>
      <button id="manage-btn-delete-backups" class="secondary" disabled>🧹 Backups löschen</button>
      <button id="manage-btn-delete" class="danger" disabled>🗑 Ausgewählte löschen</button>
    </div>
  </div>

  <!-- ===== TAB: STAGING ===== -->
  <div class="ags-pane" id="pane-staging">
    <div class="staging-split">
      <!-- LINKS: Dienste auswählen & mergen -->

<script>
/**
 * ags-import.html — Applikationslogik
 * ArcGIS Server → MapPlus Roh-Konfiguration Import & Verwaltung
 *
 * @version    1.0
 * @date       2026-02-26
 * @copyright  Trigonet AG
 * @author     Marco Dellenbach
 */

// =====================================================================
// KONFIGURATION
// =====================================================================
var API_URL = '/maps/tnet/api/v1/treebuilder-api.php';

// =====================================================================
// STATE
// =====================================================================
var _agsServices = [];      // Gecachte Dienstliste
var _agsExportingCount = 0; // Anzahl laufender Exporte
var _agsDeleting = false;   // Läuft gerade ein multi-delete?
var _agsLastImportCheckbox = null;
var _agsLastManageCheckbox = null;
var _agsLastStagingCheckbox = null;
var _importedServiceNames = {}; // Service-Namen die bereits in raw-conf vorhanden sind

function applyShiftRangeSelection(checkboxes, fromCb, toCb, checkedState) {
  if (!fromCb || !toCb || !checkboxes || checkboxes.length === 0) return;
  var start = checkboxes.indexOf(fromCb);
  var end = checkboxes.indexOf(toCb);
  if (start === -1 || end === -1) return;
  var from = Math.min(start, end);
  var to = Math.max(start, end);
  for (var i = from; i <= to; i++) {
    checkboxes[i].checked = checkedState;
  }
}

function getVisibleImportCheckboxes() {
  return Array.prototype.filter.call(
    document.querySelectorAll('#import-list .ags-item input[type=checkbox]'),
    function(cb) {
      var row = cb.closest('.ags-item');
      return row && !row.classList.contains('hidden');
    }
  );
}

function getVisibleManageCheckboxes() {
  return Array.prototype.filter.call(
    document.querySelectorAll('#manage-svc-list .ags-svc-group input[type=checkbox]'),
    function(cb) {
      var row = cb.closest('.ags-svc-group');
      return row && row.style.display !== 'none';
    }
  );
}

function refreshImportProgress() {
  var progressEl = document.getElementById('import-progress');
  var progressText = document.getElementById('import-progress-text');
  if (_agsExportingCount > 0) {
    progressEl.classList.add('active');
    progressText.textContent = _agsExportingCount + ' Import(s) laufen…';
  } else {
    progressEl.classList.remove('active');
  }
}

// =====================================================================
// TAB-SWITCHING
// =====================================================================
function switchTab(tabName) {
  document.querySelectorAll('.ags-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.ags-pane').forEach(function(p) { p.classList.remove('active'); });
  var tab = document.querySelector('[data-tab="' + tabName + '"]');
  var pane = document.getElementById('pane-' + tabName);
  if (tab) tab.classList.add('active');
  if (pane) pane.classList.add('active');

  if (tabName === 'import') {
    if (_agsServices.length === 0) {
      loadAgsServices();
    } else {
      loadImportedNamesSilent(); // Markierungen aus Verwalten-Daten auffrischen
    }
  } else if (tabName === 'manage') {
    loadRawConfList();
  } else if (tabName === 'staging') {
    loadStagingList();
    loadStagingOutput();
  }
}

document.querySelectorAll('.ags-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    switchTab(tab.dataset.tab);
  });
});

// =====================================================================
// IMPORT-TAB: Dienste laden
// =====================================================================

/**
 * Dienste von der ags2mapplus API laden
 */
function loadAgsServices() {
  var statusEl = document.getElementById('import-status');
  var listEl = document.getElementById('import-list');
  var filterEl = document.getElementById('import-filter');
  var selectBar = document.getElementById('import-select-bar');
  var actionsEl = document.getElementById('import-actions');

  statusEl.textContent = 'Dienste werden geladen…';
  statusEl.className = 'ags-status';
  statusEl.style.display = '';
  listEl.style.display = 'none';
  filterEl.style.display = 'none';
  selectBar.style.display = 'none';
  actionsEl.style.display = 'none';

  fetch(API_URL + '?action=ags-services')
    .then(function(r) { return r.json(); })
    .then(function(resp) {
      if (!resp.success) throw new Error(resp.error || 'Unbekannter Fehler');
      // Die API gibt {"dienstnamen": [...]} zurück
      var services = [];
      if (resp.data && Array.isArray(resp.data.dienstnamen)) {
        services = resp.data.dienstnamen;
      } else if (Array.isArray(resp.data)) {
        services = resp.data;
      } else if (resp.data && Array.isArray(resp.data.services)) {
        services = resp.data.services;
      } else if (resp.data && typeof resp.data === 'object') {
        services = Object.keys(resp.data);
      }
      // Duplikate entfernen und sortieren
      services = services.filter(function(v, i, a) { return a.indexOf(v) === i; }).sort();
      _agsServices = services;
      if (services.length === 0) {
        statusEl.textContent = 'Keine Dienste gefunden.';
        statusEl.className = 'ags-status error';
        return;
      }
      statusEl.textContent = services.length + ' Dienste verfügbar';
      statusEl.className = 'ags-status success';
      renderImportList(services);
      loadImportedNamesSilent(); // Verwalten-Daten nachladen für Markierungen
    })
    .catch(function(err) {
      console.error('AGS-Services laden fehlgeschlagen:', err);
      statusEl.textContent = 'Fehler: ' + err.message;
      statusEl.className = 'ags-status error';
    });
}

/**
 * Bereits importierte Service-Namen still aus raw-conf nachladen (ohne Verwalten-UI zu berühren)
 */
function loadImportedNamesSilent() {
  fetch(API_URL + '?action=ags-list-raw')
    .then(function(r) { return r.json(); })
    .then(function(resp) {
      if (!resp.success || !resp.data || !resp.data.services) return;
      _importedServiceNames = {};
      resp.data.services.forEach(function(s) {
        var k = s.service.toLowerCase();
        _importedServiceNames[k] = true;
        // Auch letztes Pfad-Segment speichern ("ewn/ewn_nis_gwr" → "ewn_nis_gwr")
        var sl = k.lastIndexOf('/');
        if (sl !== -1) _importedServiceNames[k.substring(sl + 1)] = true;
      });
      refreshImportImportedMarkers();
    })
    .catch(function() {}); // Stilles Scheitern — Import-Tab bleibt funktionsfähig
}

/**
 * Import-Liste mit Checkboxen rendern
 */
function renderImportList(services) {
  var listEl = document.getElementById('import-list');
  var filterEl = document.getElementById('import-filter');
  var selectBar = document.getElementById('import-select-bar');
  var actionsEl = document.getElementById('import-actions');

  listEl.innerHTML = '';
  _agsLastImportCheckbox = null;
  services.forEach(function(svc, i) {
    var name = typeof svc === 'string' ? svc : (svc.name || svc.serviceName || String(svc));
    var div = document.createElement('div');
    div.className = 'ags-item';
    div.dataset.name = name.toLowerCase();
    div.innerHTML = '<input type="checkbox" data-svc="' + name.replace(/"/g, '&quot;') + '" id="imp-cb-' + i + '">'
      + '<label for="imp-cb-' + i + '" class="ags-name" style="cursor:pointer;flex:1">' + name + '</label>';
    div.addEventListener('click', function(e) {
      if (e.target.tagName === 'INPUT') { updateImportSelCount(); return; }
      var cb = div.querySelector('input');
      cb.checked = !cb.checked;
      _agsLastImportCheckbox = cb;
      updateImportSelCount();
    });
    var cb = div.querySelector('input');
    cb.addEventListener('click', function(e) {
      e.stopPropagation();
      if (e.shiftKey && _agsLastImportCheckbox) {
        applyShiftRangeSelection(getVisibleImportCheckboxes(), _agsLastImportCheckbox, cb, cb.checked);
      }
      _agsLastImportCheckbox = cb;
      updateImportSelCount();
    });
    listEl.appendChild(div);
  });

  listEl.style.display = '';
  filterEl.style.display = '';
  filterEl.value = '';
  selectBar.style.display = 'flex';
  actionsEl.style.display = 'flex';
  refreshImportImportedMarkers();
  updateImportSelCount();
}

/**
 * Bereits importierte Dienste farblich markieren und Legende ein-/ausblenden
 */
function refreshImportImportedMarkers() {
  var hasAny = Object.keys(_importedServiceNames).length > 0;
  var legend = document.getElementById('import-legend');
  var listEl = document.getElementById('import-list');
  if (legend) legend.style.display = (hasAny && listEl && listEl.children.length) ? '' : 'none';
  document.querySelectorAll('#import-list .ags-item').forEach(function(div) {
    var name = div.dataset.name; // bereits lowercase
    // Vergleich: raw-conf nutzt flache Keys (awu_awu_zustand), AGS-Namen haben Slash (awu/awu_zustand)
    var isImp = !!_importedServiceNames[name]
             || !!_importedServiceNames[name.replace('\/', '_')]
             || !!_importedServiceNames[name.substring(name.lastIndexOf('\/') + 1)];
    div.classList.toggle('imported', isImp);
    var existing = div.querySelector('.ags-imported-badge');
    if (isImp && !existing) {
      var badge = document.createElement('span');
      badge.className = 'ags-imported-badge';
      badge.textContent = '\u2713 importiert';
      div.appendChild(badge);
    } else if (!isImp && existing) {
      existing.remove();
    }
  });
}

/**
 * Import-Auswahl-Zähler aktualisieren
 */
function updateImportSelCount() {
  var checked = document.querySelectorAll('#import-list input:checked');
  var total = document.querySelectorAll('#import-list input[type=checkbox]');
  document.getElementById('import-sel-info').textContent = checked.length + ' / ' + total.length + ' ausgewählt';
  document.getElementById('import-selcount').textContent = checked.length + ' Dienste ausgewählt';
  document.getElementById('import-btn-export').disabled = checked.length === 0;
}

// =====================================================================
// IMPORT-TAB: Export durchführen
// =====================================================================

/**
 * Gewählte Dienste exportieren → ZIP → data/raw-conf
 */
function exportAgsServices() {
  var checkboxes = document.querySelectorAll('#import-list input:checked');
  var dienstnamen = [];
  checkboxes.forEach(function(cb) { dienstnamen.push(cb.dataset.svc); });
  if (dienstnamen.length === 0) return;

  _agsExportingCount++;
  refreshImportProgress();
  var resultEl = document.getElementById('import-result');
  var runLabel = new Date().toLocaleTimeString('de-CH', { hour12: false });
  resultEl.style.display = '';

  // AbortController mit 16 Min Timeout (Backend hat 15 Min cURL-Timeout)
  var controller = new AbortController();
  var timeoutId = setTimeout(function() { controller.abort(); }, 16 * 60 * 1000);

  fetch(API_URL + '?action=ags-export', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ dienstnamen: dienstnamen }),
    signal: controller.signal
  })
    .then(function(r) { clearTimeout(timeoutId); return r.json(); })
    .then(function(resp) {
      _agsExportingCount = Math.max(0, _agsExportingCount - 1);
      refreshImportProgress();

      if (!resp.success) throw new Error(resp.error || 'Export fehlgeschlagen');

      var data = resp.data;
      var statusEl = document.getElementById('import-status');
      var savedCount = data.files ? data.files.length : 0;
      var failedCount = data.failedFiles ? data.failedFiles.length : 0;

      if (savedCount > 0 && failedCount === 0) {
        statusEl.textContent = '✓ Export abgeschlossen (' + runLabel + '): ' + savedCount + ' Dateien in data/Client_Data/nwow/tmp/raw-conf/ gespeichert';
        statusEl.className = 'ags-status success';
      } else if (savedCount > 0 && failedCount > 0) {
        statusEl.textContent = '⚠ Export teilweise (' + runLabel + '): ' + savedCount + ' gespeichert, ' + failedCount + ' fehlgeschlagen';
        statusEl.className = 'ags-status warning';
      } else {
        statusEl.textContent = '✗ Export fehlgeschlagen (' + runLabel + '): Keine Dateien gespeichert';
        statusEl.className = 'ags-status error';
      }

      // Ergebnis-Dateien anzeigen
      var html = '<div style="font-weight:700;font-size:12px;margin:6px 0">[' + runLabel + '] ' + dienstnamen.length + ' Dienst(e)</div>';
      if (data.files && data.files.length > 0) {
        html += '<div style="font-weight:600;font-size:12px;margin-bottom:6px">Gespeicherte Dateien:</div>';
        data.files.forEach(function(f) {
          var size = f.bytes > 1024 ? (f.bytes / 1024).toFixed(1) + ' KB' : f.bytes + ' B';
          html += '<div class="ags-result-file">'
            + '<span class="rf-icon">✓</span>'
            + '<span class="rf-name">' + f.file + '</span>'
            + '<span class="rf-size">' + size + '</span>'
            + '</div>';
        });
      }
      // Fehlgeschlagene Dateien anzeigen
      if (data.failedFiles && data.failedFiles.length > 0) {
        html += '<div style="font-weight:600;font-size:12px;margin:8px 0 6px;color:#c0392b">Fehlgeschlagene Dateien:</div>';
        data.failedFiles.forEach(function(f) {
          html += '<div class="ags-result-file">'
            + '<span class="rf-icon" style="color:#c0392b">✗</span>'
            + '<span class="rf-name">' + f.file + '</span>'
            + '<span class="rf-size" style="color:#c0392b;font-size:10px">' + f.error + '</span>'
            + '</div>';
        });
      }
      if (data.timestamp) {
        html += '<div style="font-size:10px;color:#999;margin-top:6px">Zeitpunkt: ' + data.timestamp + '</div>';
      }
      if (data.zipSize) {
        html += '<div style="font-size:10px;color:#999">ZIP-Grösse: ' + (data.zipSize / 1024).toFixed(1) + ' KB</div>';
      }
      if (html) {
        resultEl.innerHTML = html + '<hr style="border:none;border-top:1px solid #eee;margin:8px 0">' + resultEl.innerHTML;
        resultEl.style.display = '';
      }
      // Selektion leeren
      document.querySelectorAll('#import-list input:checked').forEach(function(cb) { cb.checked = false; });
      // Neu importierte markieren
      dienstnamen.forEach(function(n) { _importedServiceNames[n.toLowerCase()] = true; });
      refreshImportImportedMarkers();
      updateImportSelCount();
    })
    .catch(function(err) {
      clearTimeout(timeoutId);
      _agsExportingCount = Math.max(0, _agsExportingCount - 1);
      refreshImportProgress();
      console.error('AGS-Export fehlgeschlagen:', err);
      var statusEl = document.getElementById('import-status');
      var msg = err.message || String(err);
      if (err.name === 'AbortError') {
        msg = 'Zeitüberschreitung — der Export hat zu lange gedauert (>16 Min). Bitte weniger Dienste auf einmal exportieren.';
      } else if (msg === 'Failed to fetch' || msg === 'NetworkError when attempting to fetch resource.') {
        msg = 'Netzwerkfehler — der Server hat die Verbindung unterbrochen. Bitte erneut versuchen oder weniger Dienste auf einmal exportieren.';
      }
      statusEl.textContent = 'Fehler (' + runLabel + '): ' + msg;
      statusEl.className = 'ags-status error';
      resultEl.innerHTML = '<div style="font-weight:700;font-size:12px;margin:6px 0;color:#c0392b">[' + runLabel + '] ✗ Fehler</div>'
        + '<div style="font-size:11px;color:#c0392b">' + msg + '</div>'
        + '<hr style="border:none;border-top:1px solid #eee;margin:8px 0">' + resultEl.innerHTML;
      resultEl.style.display = '';
    });
}

// =====================================================================
// VERWALTEN-TAB: Bestehende Configs laden
// =====================================================================

/**
 * Bestehende raw-conf Dateien laden und anzeigen
 */
function loadRawConfList() {
  var statusEl = document.getElementById('manage-status');
  var listEl = document.getElementById('manage-svc-list');
  var filterEl = document.getElementById('manage-filter');
  var selectBar = document.getElementById('manage-select-bar');
  var actionsEl = document.getElementById('manage-actions');

  statusEl.textContent = 'Lade bestehende Konfigurationen…';
  statusEl.className = 'ags-status';
  statusEl.style.display = '';
  listEl.innerHTML = '';
  filterEl.style.display = 'none';
  selectBar.style.display = 'none';
  actionsEl.style.display = 'none';

  var filterMode = document.getElementById('manage-backup-filter').value || 'active';
  var url = API_URL + '?action=ags-list-raw';
  if (filterMode === 'all') {
    url += '&includeBackups=1';
  } else if (filterMode === 'backups') {
    url += '&backupOnly=1';
  }

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(resp) {
      if (!resp.success) throw new Error(resp.error || 'Fehler');
      var data = resp.data;
      if (!data.exists || !data.services || data.services.length === 0) {
        statusEl.textContent = 'Keine Roh-Konfigurationen für den aktuellen Filter vorhanden.';
        statusEl.className = 'ags-status';
        return;
      }
      statusEl.textContent = data.services.length + ' Services, ' + data.files.length + ' Dateien in data/Client_Data/nwow/tmp/raw-conf/';
      statusEl.className = 'ags-status success';
      filterEl.style.display = '';
      filterEl.value = '';
      selectBar.style.display = 'flex';
      actionsEl.style.display = 'flex';
      renderManageList(data.services);
      // _importedServiceNames für Import-Tab aktualisieren
      _importedServiceNames = {};
      data.services.forEach(function(s) {
        var k = s.service.toLowerCase();
        _importedServiceNames[k] = true;
        var sl = k.lastIndexOf('/');
        if (sl !== -1) _importedServiceNames[k.substring(sl + 1)] = true;
      });
      refreshImportImportedMarkers();
    })
    .catch(function(err) {
      console.error('raw-conf laden fehlgeschlagen:', err);
      statusEl.textContent = 'Fehler: ' + err.message;
      statusEl.className = 'ags-status error';
    });
}

/**
 * Service-Liste mit Checkboxen und aufklappbaren Dateidetails rendern
 */
function renderManageList(services) {
  var listEl = document.getElementById('manage-svc-list');
  listEl.innerHTML = '';
  _agsLastManageCheckbox = null;

  services.forEach(function(svc, i) {
    var group = document.createElement('div');
    group.className = 'ags-svc-group';
    group.dataset.svcname = svc.service.toLowerCase();

    var totalSize = svc.totalSize > 1024 ? (svc.totalSize / 1024).toFixed(1) + ' KB' : svc.totalSize + ' B';

    var head = document.createElement('div');
    head.className = 'ags-svc-head';
    // Statischer HTML-Inhalt zuerst setzen (innerHTML += würde Listener auf später angehängten Nodes zerstören)
    head.innerHTML = '<span class="svc-arrow">▶</span>'
      + '<span class="svc-name">' + svc.service + '</span>'
      + '<span class="svc-badge">' + svc.files.length + ' Dateien</span>'
      + '<span class="svc-size">' + totalSize + '</span>';

    // Checkbox für Multi-Select — nach innerHTML anhängen, damit Listener intakt bleibt
    var cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.dataset.svc = svc.service;
    cb.id = 'mgr-cb-' + i;
    cb.addEventListener('click', function(e) {
      e.stopPropagation();
      if (e.shiftKey && _agsLastManageCheckbox) {
        applyShiftRangeSelection(getVisibleManageCheckboxes(), _agsLastManageCheckbox, cb, cb.checked);
      }
      _agsLastManageCheckbox = cb;
      updateManageSelCount();
    });
    head.insertBefore(cb, head.firstChild);

    // Einzel-Löschen-Button
    var delBtn = document.createElement('button');
    delBtn.className = 'svc-del';
    delBtn.textContent = '🗑';
    delBtn.title = 'Alle Dateien dieses Dienstes löschen';
    delBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      deleteSingleService(svc.service);
    });
    head.appendChild(delBtn);

    // Aufklappen/Zuklappen (Klick auf Head, aber nicht auf Checkbox/Delete)
    head.addEventListener('click', function(e) {
      if (e.target.tagName === 'INPUT' || e.target.closest('.svc-del')) return;
      group.classList.toggle('open');
    });

    // Datei-Liste
    var filesDiv = document.createElement('div');
    filesDiv.className = 'ags-svc-files';
    svc.files.forEach(function(f) {
      var fSize = f.size > 1024 ? (f.size / 1024).toFixed(1) + ' KB' : f.size + ' B';
      var fileEl = document.createElement('div');
      fileEl.className = 'ags-svc-file';
      var shortName = f.file.replace(svc.service + '/', '');
      fileEl.innerHTML = '<span class="sf-name">' + shortName + (f.isBackup ? ' <span style="color:#c0392b">(Backup)</span>' : '') + '</span>'
        + '<span class="sf-size">' + fSize + '</span>'
        + '<span class="sf-date">' + f.modified + '</span>';
      // Edit-Button
      var editBtn = document.createElement('button');
      editBtn.className = 'sf-edit';
      editBtn.textContent = '✏️';
      editBtn.title = 'Datei anzeigen / bearbeiten';
      editBtn.dataset.relFile = f.file;
      editBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        openFileEditor(f.file);
      });
      fileEl.appendChild(editBtn);
      filesDiv.appendChild(fileEl);
    });

    group.appendChild(head);
    group.appendChild(filesDiv);
    listEl.appendChild(group);
  });

  updateManageSelCount();
}

/**
 * Verwalten-Auswahl-Zähler aktualisieren
 */
function updateManageSelCount() {
  var checked = document.querySelectorAll('#manage-svc-list input:checked');
  var total = document.querySelectorAll('#manage-svc-list input[type=checkbox]');

/**
 * Mehrere ausgewählte Services sequenziell löschen
 */
function deleteSelectedServices() {
  if (_agsDeleting) return;

  var checkboxes = document.querySelectorAll('#manage-svc-list input:checked');
  var services = [];
  checkboxes.forEach(function(cb) { services.push(cb.dataset.svc); });
  if (services.length === 0) return;

  // Bestätigungs-Dialog mit Service-Liste
  var msg = services.length + ' Services löschen?\n\n'
    + services.map(function(s) { return '  • ' + s; }).join('\n')
    + '\n\nDiese Aktion kann nicht rückgängig gemacht werden.';
  if (!confirm(msg)) return;

  _agsDeleting = true;
  var statusEl = document.getElementById('manage-status');
  var progressEl = document.getElementById('manage-progress');
  var progressText = document.getElementById('manage-progress-text');
  var deleteBtn = document.getElementById('manage-btn-delete');

  progressEl.classList.add('active');
  deleteBtn.disabled = true;

  var done = 0;
  var failed = [];
  var totalFiles = 0;

  // Sequenzielles Löschen via Promise-Kette
  function deleteNext(index) {
    if (index >= services.length) {
      // Fertig
      _agsDeleting = false;
      progressEl.classList.remove('active');

      if (failed.length === 0) {
        statusEl.textContent = '✓ ' + done + ' Services gelöscht (' + totalFiles + ' Dateien entfernt)';
        statusEl.className = 'ags-status success';
      } else {
        statusEl.textContent = done + ' gelöscht, ' + failed.length + ' fehlgeschlagen: ' + failed.join(', ');
        statusEl.className = 'ags-status error';
      }
      loadRawConfList();
      return;
    }

    var svc = services[index];
    progressText.textContent = 'Lösche ' + (index + 1) + ' / ' + services.length + ': ' + svc + '…';

    fetch(API_URL + '?action=ags-delete-raw', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ service: svc })
    })
      .then(function(r) { return r.json(); })
      .then(function(resp) {
        if (!resp.success) {
          failed.push(svc);
        } else {
          done++;
          totalFiles += (resp.data.count || 0);
        }
        deleteNext(index + 1);
      })
      .catch(function(err) {
        console.error('Löschen fehlgeschlagen:', svc, err);
        failed.push(svc);
        deleteNext(index + 1);
      });
  }

  deleteNext(0);
}

/**
 * Highlighting im Editor aktualisieren
 */
function updateEditorHighlight() {
  var textarea  = document.getElementById('file-editor-textarea');
  var highlight = document.getElementById('file-editor-highlight');
  var lineNums  = document.getElementById('file-editor-line-numbers');
  var text = textarea.value;
  var lines = text.split('\n');
  // Zeilennummern
  var nums = lines.map(function(_, i) {
    return i + 1 === _feErrorLine
      ? '<span class="ln-err">' + (i + 1) + '</span>'
      : (i + 1);
  }).join('\n');
  lineNums.innerHTML = nums + '\n';
  // Syntax-Highlighting
  var html;
  if (_feIsJson) {
    html = syntaxHighlightJson(text);
  } else {
    html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  // Fehlerzeile + Spaltenmarkierung
  if (_feErrorLine) {
    var parts = html.split('\n');
    var idx = _feErrorLine - 1;
    if (idx < parts.length) {
      parts[idx] = '<span class="j-err-line">' + insertColMarker(parts[idx], _feErrorCol) + '</span>';
    }
    html = parts.join('\n');
  }
  highlight.innerHTML = html + '\n';
  // Zur Fehlerzeile scrollen
  if (_feErrorLine) {
    var lh = parseFloat(getComputedStyle(highlight).lineHeight) || 18;
    var target = Math.max(0, (_feErrorLine - 1) * lh - highlight.clientHeight / 2 + lh);
    highlight.scrollTop = target;
    textarea.scrollTop  = target;
    lineNums.scrollTop  = target;
  } else {
    highlight.scrollTop  = textarea.scrollTop;
    highlight.scrollLeft = textarea.scrollLeft;
    lineNums.scrollTop   = textarea.scrollTop;
  }
}

function getJsonErrorPos(str, errMsg) {
  var line = null, col = null;
  var mLine = errMsg.match(/line\s+(\d+)/i);
  var mCol  = errMsg.match(/column\s+(\d+)/i);
  if (mLine) line = parseInt(mLine[1], 10);
  if (mCol)  col  = parseInt(mCol[1],  10);
  if (!line) {
    var mPos = errMsg.match(/position\s+(\d+)/i);
    if (mPos) {
      var pos    = parseInt(mPos[1], 10);
      var before = str.substring(0, pos);
      line = before.split('\n').length;
      col  = pos - before.lastIndexOf('\n');
    }
  }
  return { line: line, col: col };
}

function insertColMarker(htmlLine, col) {
  if (!col || col < 1) return htmlLine;
  var count = 0, i = 0, s = htmlLine;
  while (i < s.length && count < col - 1) {
    if (s[i] === '<') { while (i < s.length && s[i] !== '>') i++; i++; }
    else if (s[i] === '&') { while (i < s.length && s[i] !== ';') i++; i++; count++; }
    else { i++; count++; }
  }
  return s.slice(0, i) + '<span class="j-err-col" title="Fehler hier"></span>' + s.slice(i);
}

/**
 * JSON validieren (und bei Gültigkeit formatieren)
 */
function validateFileEditor() {
  var textarea = document.getElementById('file-editor-textarea');
  var statusEl = document.getElementById('file-editor-status');
  if (!_feIsJson) {
    statusEl.textContent = 'Keine JSON-Datei — Validierung nicht verfügbar';
    statusEl.className = '';
    return;
  }
  var result = validateJsonText(textarea.value);
  if (result.valid) {
    _feErrorLine = null; _feErrorCol = null;
    try {
      textarea.value = JSON.stringify(JSON.parse(textarea.value), null, 2);
      updateEditorHighlight();
    } catch(e) {}
    statusEl.textContent = '✓ Gültiges JSON (formatiert)';
    statusEl.className = 'ok';
    textarea.className = 'valid';
  } else {
    var ep = getJsonErrorPos(textarea.value, result.error);
    _feErrorLine = ep.line; _feErrorCol = ep.col;
    updateEditorHighlight();
    var loc = ep.line ? ' (Zeile ' + ep.line + (ep.col ? ', Spalte ' + ep.col : '') + ')' : '';
    statusEl.textContent = '✗ ' + result.error + loc;
    statusEl.className = 'err';
    textarea.className = 'invalid';
  }
}

/**
 * JSON-String mit Syntax-Highlighting in HTML umwandeln
 */
function syntaxHighlightJson(str) {
  // Escape HTML-Sonderzeichen zuerst
  var escaped = str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  // Dann Tokens einfärben
  return escaped.replace(
    /("[^"\\]*(?:\\.[^"\\]*)*")\s*:/g,  // Keys
    '<span class="j-key">$1</span>:'
  ).replace(
    /:\s*("[^"\\]*(?:\\.[^"\\]*)*")/g,   // String-Values
    ': <span class="j-str">$1</span>'
  ).replace(
    /:\s*(-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)/g, // Number-Values
    ': <span class="j-num">$1</span>'
  ).replace(
    /:\s*(true|false)/g,                 // Boolean-Values
    ': <span class="j-bool">$1</span>'
  ).replace(
    /:\s*(null)/g,                       // Null-Values
    ': <span class="j-null">$1</span>'
  );
}

/**
 * JSON-Text validieren; gibt {valid, error} zurück
 */
function validateJsonText(str) {
  try {
    JSON.parse(str);
    return { valid: true, error: null };
  } catch (e) {
    return { valid: false, error: e.message };
  }
}

/** Aktuell im Editor geöffneter Datei-Pfad */
var _feCurrentFile = null;
/** API-Actions für Lesen/Schreiben (können per openFileEditor überschrieben werden) */
var _feReadAction  = 'ags-read-raw';
var _feWriteAction = 'ags-write-raw';
var _feAfterSave   = null; // Callback nach erfolgreichem Speichern
/** true wenn die Datei eine JSON-Datei ist */
var _feIsJson = false;
/** Fehler-Zeilennummer für Highlighting (null = kein Fehler) */
var _feErrorLine = null;
var _feErrorCol  = null;

/**
 * Datei im Editor öffnen (lädt Inhalt vom Server)
 */
function openFileEditor(relPath, readAction, writeAction, afterSave) {
  var overlay    = document.getElementById('file-editor-overlay');
  var filenameEl = document.getElementById('file-editor-filename');
  var textarea   = document.getElementById('file-editor-textarea');
  var highlight  = document.getElementById('file-editor-highlight');
  var statusEl   = document.getElementById('file-editor-status');
  var saveBtn    = document.getElementById('file-editor-save');

  _feCurrentFile = relPath;
  _feIsJson = /\.(json5?|conf)$/i.test(relPath);
  _feReadAction  = readAction  || 'ags-read-raw';
  _feWriteAction = writeAction || 'ags-write-raw';
  _feAfterSave   = afterSave   || null;

  filenameEl.textContent = relPath;
  textarea.value = 'Lade…';
  highlight.textContent = 'Lade…';
  textarea.className = '';
  _feErrorLine = null; _feErrorCol = null;
  statusEl.textContent = '';
  statusEl.className = '';
  saveBtn.disabled = true;

  overlay.classList.add('open');

  fetch(API_URL + '?action=' + _feReadAction + '&file=' + encodeURIComponent(relPath))
    .then(function(r) { return r.json(); })
    .then(function(resp) {
      if (!resp.success) throw new Error(resp.error || 'Fehler');
      textarea.value = resp.data.content;
      updateEditorHighlight();
      saveBtn.disabled = false;
      if (_feIsJson) {
        var result = validateJsonText(resp.data.content);
        textarea.className = result.valid ? 'valid' : 'invalid';
        statusEl.textContent = result.valid ? '✓ Gültiges JSON' : '✗ ' + result.error;
        statusEl.className = result.valid ? 'ok' : 'err';
      } else {
        statusEl.textContent = resp.data.size + ' Bytes';
        statusEl.className = '';
      }
    })
    .catch(function(err) {
      textarea.value = '';
      highlight.textContent = '';
      saveBtn.disabled = true;
      statusEl.textContent = 'Fehler beim Laden: ' + err.message;
      statusEl.className = 'err';
    });
}

 * Editor-Tab wechseln (Bearbeiten / Vorschau) — wird nicht mehr benötigt, bleibt als Stub
 */

/**
 * Datei speichern (POST ags-write-raw)
 */
function saveFileEditor() {
  if (!_feCurrentFile) return;
  var textarea = document.getElementById('file-editor-textarea');
  var statusEl = document.getElementById('file-editor-status');
  var saveBtn  = document.getElementById('file-editor-save');

  // Bei JSON-Dateien vor dem Speichern validieren
  if (_feIsJson) {
    var result = validateJsonText(textarea.value);
    if (!result.valid) {
      if (!confirm('Das JSON ist ungültig:\n' + result.error + '\n\nTrotzdem speichern?')) return;
    }
  }

  saveBtn.disabled = true;
  statusEl.textContent = 'Speichere…';
  statusEl.className = '';

  fetch(API_URL + '?action=' + _feWriteAction, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ file: _feCurrentFile, content: textarea.value })
  })
    .then(function(r) {
      if (!r.ok && r.status !== 200) return r.text().then(function(t) { throw new Error('HTTP ' + r.status + (t ? ': ' + t.substring(0, 120) : '')); });
      return r.json();
    })
    .then(function(resp) {
      saveBtn.disabled = false;
      if (!resp.success) throw new Error(resp.error || 'Speichern fehlgeschlagen');
      var d = resp.data;
      statusEl.textContent = '✓ Gespeichert (' + (d.bytes / 1024).toFixed(1) + ' KB)';
      if (d.backupCreated) statusEl.textContent += ' — Backup: ' + d.backup;
      statusEl.className = 'ok';
      if (_feAfterSave) _feAfterSave(); else loadRawConfList();
    })
    .catch(function(err) {
      saveBtn.disabled = false;
      statusEl.textContent = '✗ Fehler: ' + err.message;
      statusEl.className = 'err';
    });
}

/**
 * Staging-Dienstliste rendern (ohne Delete-Button, ohne Edit)
 */
function renderStagingList(services) {
  var listEl = document.getElementById('staging-svc-list');
  listEl.innerHTML = '';
  _agsLastStagingCheckbox = null;

  services.forEach(function(svc, i) {
    var totalSize = svc.totalSize > 1024 ? (svc.totalSize / 1024).toFixed(1) + ' KB' : svc.totalSize + ' B';
    var group = document.createElement('div');
    group.className = 'ags-svc-group';
    group.dataset.svcname = svc.service.toLowerCase();
    group.dataset.svckey  = svc.service;

    var head = document.createElement('div');
    head.className = 'ags-svc-head';
    head.innerHTML = '<span class="svc-arrow">▶</span>'
      + '<span class="svc-name">' + svc.service + '</span>'
      + '<span class="svc-badge">' + svc.files.length + ' Dateien</span>'
      + '<span class="svc-size">' + totalSize + '</span>';

    var cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.dataset.svc = svc.service;
    cb.id = 'stg-cb-' + i;
    cb.addEventListener('click', function(e) {
      e.stopPropagation();
      if (e.shiftKey && _agsLastStagingCheckbox) {
        applyShiftRangeSelection(getVisibleStagingCheckboxes(), _agsLastStagingCheckbox, cb, cb.checked);
      }
      _agsLastStagingCheckbox = cb;
      updateStagingSelCount();
    });
    head.insertBefore(cb, head.firstChild);

    head.addEventListener('click', function(e) {
      if (e.target.tagName === 'INPUT') return;
      group.classList.toggle('open');
    });

    // Datei-Liste
    var fileList = document.createElement('div');
    fileList.className = 'ags-svc-files';
    svc.files.forEach(function(f) {
      var row = document.createElement('div');
      row.className = 'ags-svc-file';
      var size = f.size > 1024 ? (f.size / 1024).toFixed(1) + ' KB' : f.size + ' B';
      row.innerHTML = '<span class="sf-name">' + f.file + '</span><span class="sf-size">' + size + '</span>';
      fileList.appendChild(row);
    });

    group.appendChild(head);
    group.appendChild(fileList);
    listEl.appendChild(group);
  });

  updateStagingSelCount();
}

function getVisibleStagingCheckboxes() {
  return Array.prototype.filter.call(
    document.querySelectorAll('#staging-svc-list .ags-svc-group input[type=checkbox]'),
    function(cb) {
      var row = cb.closest('.ags-svc-group');
      return row && row.style.display !== 'none';
    }
  );
}

function updateStagingSelCount() {
  var checked = document.querySelectorAll('#staging-svc-list input:checked');
  var total   = document.querySelectorAll('#staging-svc-list input[type=checkbox]');
  document.getElementById('staging-sel-info').textContent = checked.length + ' / ' + total.length + ' ausgewählt';
  document.getElementById('staging-selcount').textContent = checked.length + ' Dienste ausgewählt';
  var kuerzel = (document.getElementById('staging-kuerzel').value || '').trim();
  document.getElementById('staging-btn-merge').disabled = (checked.length === 0 || kuerzel === '');
}

/**
 * Gewählte Dienste zusammenführen und in ImportToCore schreiben
 */
function executeStagingMerge() {
  var checkboxes = document.querySelectorAll('#staging-svc-list input:checked');
  var services = [];
  checkboxes.forEach(function(cb) { services.push(cb.dataset.svc); });
  var kuerzel = (document.getElementById('staging-kuerzel').value || '').trim();
  if (services.length === 0 || !kuerzel) return;

  var btn = document.getElementById('staging-btn-merge');
  var resultEl = document.getElementById('staging-result');
  var statusEl = document.getElementById('staging-status');
  btn.disabled = true;
  statusEl.textContent = 'Zusammenführen läuft…';
  statusEl.className = 'ags-status';
  resultEl.style.display = 'none';

  fetch(API_URL + '?action=ags-stage-merge', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ services: services, kuerzel: kuerzel })
  })
    .then(function(r) { return r.json(); })
    .then(function(resp) {
      btn.disabled = false;
      if (!resp.success) throw new Error(resp.error || 'Merge fehlgeschlagen');
      var d = resp.data;
      statusEl.textContent = '✓ ' + d.files.length + ' Dateien → ImportToCore/' + d.kuerzel + '/';
      statusEl.className = 'ags-status success';
      var html = '';
      // Duplikat-Warnungen (neues Format: keys = [{key, count, sources}])
      if (d.duplicates && d.duplicates.length) {
        statusEl.textContent += ' — ⚠ Duplikate!';
        statusEl.className = 'ags-status';
        statusEl.style.color = '#e67e22';
        d.duplicates.forEach(function(dup) {
          html += '<div style="color:#e67e22;font-weight:700;font-size:11px;margin:4px 0 2px">⚠ ' + dup.file + ': ' + dup.count + ' doppelte Keys</div>';
          dup.keys.forEach(function(dk) {
            var src = dk.sources ? dk.sources.join(', ') : '';
            html += '<div style="font-size:10px;color:#c33;padding-left:12px;font-family:Consolas,monospace">• ' + dk.key + ' <span style="color:#999">(' + src + ')</span></div>';
          });
        });
      }
      if (d.errors && d.errors.length) {
        html += '<div style="color:#c33;font-size:11px">Warnungen: ' + d.errors.join('; ') + '</div>';
      }
      if (html) { resultEl.innerHTML = html; resultEl.style.display = ''; }
      else { resultEl.style.display = 'none'; }
      updateStagingSelCount();
      loadStagingOutput(); // Rechtes Panel aktualisieren
    })
    .catch(function(err) {
      btn.disabled = false;
      statusEl.textContent = '✗ Fehler: ' + err.message;
      statusEl.className = 'ags-status error';
    });
}

// =====================================================================
// STAGING RECHTS: ImportToCore Ausgabe
// =====================================================================

function loadStagingOutput() {
  var listEl   = document.getElementById('stg-output-list');
  var statusEl = document.getElementById('stg-output-status');
  var delBtn   = document.getElementById('stg-output-delete-sel');
  listEl.innerHTML = '';
  statusEl.textContent = 'Lade…';
  delBtn.disabled = true;
  fetch(API_URL + '?action=staging-list-output')
    .then(function(r) { return r.json(); })
    .then(function(resp) {
      if (!resp.success) throw new Error(resp.error || 'Fehler');
      var d = resp.data;
      if (!d.exists || !d.kuerzel || d.kuerzel.length === 0) {
        statusEl.textContent = 'Noch keine Ausgaben vorhanden.';
        return;
      }
      statusEl.textContent = d.kuerzel.length + ' Kürzel';
      renderStagingOutput(d.kuerzel);
      // Cross-Kürzel Duplikat-Zusammenfassung
      var crossTotal = 0;
      d.kuerzel.forEach(function(k) { k.files.forEach(function(f) { if (f.crossDuplicateKeys && f.crossDuplicateKeys.length) crossTotal += f.crossDuplicateKeys.length; }); });
      if (crossTotal > 0) {
        var warn = document.createElement('div');
        warn.className = 'stg-cross-dup-summary';
        warn.textContent = '⚠ ' + crossTotal + ' kürzelübergreifende Key-Konflikte erkannt!';
        listEl.insertBefore(warn, listEl.firstChild);
      }
    })
    .catch(function(err) { statusEl.textContent = '✗ ' + err.message; });
}

function renderStagingOutput(kuerzelList) {
  var listEl = document.getElementById('stg-output-list');
  listEl.innerHTML = '';
  kuerzelList.forEach(function(k) {
    var totalKB = k.size > 1024 ? (k.size / 1024).toFixed(1) + ' KB' : k.size + ' B';
    var hdr = document.createElement('div');
    hdr.className = 'stg-output-kuerzel';
    var cb = document.createElement('input');
    cb.type = 'checkbox'; cb.dataset.kuerzel = k.kuerzel; cb.id = 'stg-out-cb-' + k.kuerzel;
    cb.addEventListener('change', function() {
      var any = !!document.querySelector('#stg-output-list input[type=checkbox]:checked');
      document.getElementById('stg-output-delete-sel').disabled = !any;
    });
    var lbl = document.createElement('label');
    lbl.htmlFor = 'stg-out-cb-' + k.kuerzel;
    lbl.innerHTML = '<b>' + k.kuerzel + '</b>&nbsp;<span style="font-weight:400;color:#888;font-size:10px">(' + k.files.length + ' Dateien, ' + totalKB + ')</span>';
    hdr.appendChild(cb); hdr.appendChild(lbl);
    listEl.appendChild(hdr);
    k.files.forEach(function(f) {
      var row = document.createElement('div');
      row.className = 'stg-output-file';
      var sz = f.size > 1024 ? (f.size / 1024).toFixed(1) + ' KB' : f.size + ' B';
      var nameEl = document.createElement('span'); nameEl.className = 'of-name'; nameEl.textContent = f.name; nameEl.title = f.file;
      var sizeEl = document.createElement('span'); sizeEl.className = 'of-size'; sizeEl.textContent = sz;
      // Duplikat-Badge (neues Format: [{key, count, sources}])
      if (f.duplicateKeys && f.duplicateKeys.length) {
        row.classList.add('has-dups');
        var dupBadge = document.createElement('span');
        dupBadge.className = 'of-dup';
        dupBadge.textContent = '⚠ ' + f.duplicateKeys.length + ' Dups';
        // Tooltip mit Keys und Quell-Dateien
        var tipLines = f.duplicateKeys.map(function(dk) {
          var src = dk.sources ? dk.sources.join(' + ') : '';
          return dk.key + ' (' + src + ')';
        });
        dupBadge.title = 'Doppelte Keys:\n' + tipLines.join('\n');
        row.appendChild(nameEl); row.appendChild(dupBadge);
      } else {
        row.appendChild(nameEl);
      }
      row.appendChild(sizeEl);
      var editBtn = document.createElement('button'); editBtn.className = 'of-edit'; editBtn.title = 'Bearbeiten'; editBtn.textContent = '✏';
      editBtn.addEventListener('click', function() {
        openFileEditor(f.file, 'staging-read-output', 'staging-write-output', loadStagingOutput);
      });
      row.appendChild(editBtn);
      listEl.appendChild(row);
      // Intra-Kürzel Duplikat-Detail-Zeilen (aufklappbar per Badge-Klick)
      if (f.duplicateKeys && f.duplicateKeys.length) {
        var dupWrap = document.createElement('div');
        dupWrap.className = 'stg-dup-details-wrap';
        dupWrap.style.display = 'none';
        f.duplicateKeys.forEach(function(dk) {
          var dd = document.createElement('div');
          dd.className = 'stg-dup-detail';
          var src = dk.sources ? dk.sources.join(' + ') : '';
          dd.innerHTML = '• <b>' + dk.key + '</b> <span style="color:#999">(' + src + ')</span>';
          dupWrap.appendChild(dd);
        });
        listEl.appendChild(dupWrap);
        var dupBadgeEl = row.querySelector('.of-dup');
        if (dupBadgeEl) { dupBadgeEl.style.cursor = 'pointer'; dupBadgeEl.addEventListener('click', function() { dupWrap.style.display = dupWrap.style.display === 'none' ? '' : 'none'; }); }
      }
      // Kürzelübergreifende Duplikat (aufklappbar per Badge-Klick)
      if (f.crossDuplicateKeys && f.crossDuplicateKeys.length) {
        if (!row.classList.contains('has-dups')) {
          row.classList.add('has-cross-dups');
        }
        var crossBadge = document.createElement('span');
        crossBadge.className = 'of-cross-dup';
        crossBadge.textContent = '✗ ' + f.crossDuplicateKeys.length + ' Konflikte';
        var crossTip = f.crossDuplicateKeys.map(function(cd) { return cd.key + ' ↔ ' + cd.conflictsWith.join(', '); });
        crossBadge.title = 'Kürzelübergreifende Konflikte:\n' + crossTip.join('\n');
        crossBadge.style.cursor = 'pointer';
        row.insertBefore(crossBadge, editBtn);
        var crossWrap = document.createElement('div');
        crossWrap.className = 'stg-dup-details-wrap';
        crossWrap.style.display = 'none';
        f.crossDuplicateKeys.forEach(function(cd) {
          var dd = document.createElement('div');
          dd.className = 'stg-cross-dup-detail';
          dd.innerHTML = '✗ <b>' + cd.key + '</b> <span style="color:#999">↔ ' + cd.conflictsWith.join(', ') + '</span>';
          crossWrap.appendChild(dd);
        });
        listEl.appendChild(crossWrap);
        crossBadge.addEventListener('click', function() { crossWrap.style.display = crossWrap.style.display === 'none' ? '' : 'none'; });
      }
    });
  });
}

function deleteStagingOutputFiles() {
  var checked = document.querySelectorAll('#stg-output-list input[type=checkbox]:checked');
  var items = [];
  checked.forEach(function(cb) { items.push(cb.dataset.kuerzel); });
  if (items.length === 0) return;
  if (!confirm('Löschen:\n' + items.join('\n'))) return;
  fetch(API_URL + '?action=staging-delete-output', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ kuerzel: items })
  })
    .then(function(r) { return r.json(); })
    .then(function() { loadStagingOutput(); })
    .catch(function() { loadStagingOutput(); });
}

// ===== DATEI-EDITOR: Event-Handler =====

// Scroll-Sync (Textarea → Highlight + Zeilennummern) — nur wenn kein Fehler-Scroll aktiv
document.getElementById('file-editor-textarea').addEventListener('scroll', function() {
  var h  = document.getElementById('file-editor-highlight');
  var ln = document.getElementById('file-editor-line-numbers');
  h.scrollTop = this.scrollTop; h.scrollLeft = this.scrollLeft;
  ln.scrollTop = this.scrollTop;
});

// Schliessen
document.getElementById('file-editor-close').addEventListener('click', function() {
  document.getElementById('file-editor-overlay').classList.remove('open');
  _feCurrentFile = null;
});

// Klick auf Overlay-Hintergrund schliesst Modal
document.getElementById('file-editor-overlay').addEventListener('click', function(e) {
  if (e.target === this) {
    this.classList.remove('open');
    _feCurrentFile = null;
  }
});

// Escape-Taste schliesst Modal
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('file-editor-overlay').classList.contains('open')) {
    document.getElementById('file-editor-overlay').classList.remove('open');
    _feCurrentFile = null;
  }
});

// Live-Validierung + Highlighting beim Tippen
document.getElementById('file-editor-textarea').addEventListener('input', function() {
  if (_feIsJson) {
    var result = validateJsonText(this.value);
    this.className = result.valid ? 'valid' : 'invalid';
    var _ep = result.valid ? {line:null,col:null} : getJsonErrorPos(this.value, result.error);
    _feErrorLine = _ep.line; _feErrorCol = _ep.col;
    var statusEl = document.getElementById('file-editor-status');
    statusEl.textContent = result.valid ? '✓ Gültiges JSON' : '✗ ' + result.error;
    statusEl.className = result.valid ? 'ok' : 'err';
  }
  updateEditorHighlight();
});

// Validieren-Button
document.getElementById('file-editor-validate').addEventListener('click', validateFileEditor);

// Speichern-Button
document.getElementById('file-editor-save').addEventListener('click', saveFileEditor);
