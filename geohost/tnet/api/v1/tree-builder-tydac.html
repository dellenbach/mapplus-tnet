  function openIconPicker(path) {
    _iconTargetPath = path;
    $('iconModal').classList.add('open');
    if (_symbolSets) { renderIconGrid(); } else { loadSymbolSets(); }
  }
  function loadSymbolSets() {
    $('iconGrid').innerHTML = '<div class="empty">Lade Symbole…</div>';
    api('list-symbolsets').then(function (j) {
      if (!j.success) { $('iconGrid').innerHTML = '<div class="empty">Fehler: ' + esc(j.error || '') + '</div>'; return; }
      _symbolSets = j.data;
      renderIconGrid();
    }).catch(function (e) { $('iconGrid').innerHTML = '<div class="empty">' + esc(e.message) + '</div>'; });
  }
  function renderIconGrid() {
    var q = ($('iconSearch').value || '').toLowerCase();
    var sets = (_symbolSets && _symbolSets.sets) || [];
    var html = '';
    var any = false;
    sets.forEach(function (set) {
      var items = set.items.filter(function (it) { return !q || it.name.toLowerCase().indexOf(q) !== -1; });
      if (!items.length) return;
      any = true;
      html += '<div class="set-title">' + esc(set.label) + ' (' + items.length + ')</div><div class="icon-grid">';
      items.forEach(function (it) {
        html += '<div class="icon-cell" data-url="' + esc(it.url) + '" title="' + esc(it.name) + '">' +
          '<img src="' + esc(it.url) + '" alt="" onerror="this.style.visibility=\'hidden\'">' +
          '<div class="nm">' + esc(it.name) + '</div></div>';
      });
      html += '</div>';
    });
    $('iconGrid').innerHTML = any ? html : '<div class="empty">Keine Symbole gefunden.</div>';
    Array.prototype.forEach.call($('iconGrid').querySelectorAll('.icon-cell'), function (c) {
      c.addEventListener('click', function () { chooseIcon(c.getAttribute('data-url')); });
    });
  }
  function chooseIcon(url) {
    // Alternativer Ziel-Callback (z.B. Layer-Definition-Icon) hat Vorrang
    if (typeof _iconChoose === 'function') {
      var cb = _iconChoose; _iconChoose = null;
      $('iconModal').classList.remove('open');
      cb(url);
      return;
    }
    var node = getByPath(_iconTargetPath);
    if (node) {
      // Als app-root-relativen Pfad speichern (portabel). URL beginnt mit APP_ROOT.
      node.icon = url.indexOf(APP_ROOT) === 0 ? url : url;
      if (!node.icon_style) node.icon_style = 'width:18px;height:18px';
      markDirty();
    }
    $('iconModal').classList.remove('open');
    renderProperties(_iconTargetPath, 'subgroup');
    refreshLabels();
  }

  function uploadIcon(fileInput) {
    var f = fileInput.files && fileInput.files[0];
    if (!f) return;
    var fd = new FormData();
    fd.append('icon', f);
    setStatus('Lade Symbol hoch…');
    fetch(getApiUrl() + '?action=upload-icon&ctx_root=' + encodeURIComponent(_ctxRoot), { method: 'POST', credentials: 'same-origin', body: fd })
      .then(function (r) {
        if (r.status === 401 || r.status === 403) { location.href = 'admin-login.php?redirect=' + encodeURIComponent(location.pathname); throw new Error('nicht angemeldet'); }
        return r.json();
      })
      .then(function (j) {
        if (!j.success) { setStatus('Upload-Fehler: ' + (j.error || ''), 'err'); return; }
        setStatus('Symbol hochgeladen: ' + j.data.name, 'ok');
        _symbolSets = null; // Cache invalidieren
        loadSymbolSets();
        // Direkt zuweisen
        if (_iconTargetPath) chooseIcon(j.data.url);
      })
      .catch(function (e) { setStatus('Upload-Fehler: ' + e.message, 'err'); })
      .finally(function () { fileInput.value = ''; });
  }

  // =====================================================================
  // LADEN / SPEICHERN / LOCK / HISTORIE
  // =====================================================================
  function loadProfiles() {
    var sel = $('profileSelect');
    sel.innerHTML = '<option value="">— wählen —</option>';

    Promise.all([
      api('list-config-groups').catch(function () { return { success: false, data: [] }; }),
      api('tydac-list-profiles').catch(function () { return { success: false, data: [] }; })
    ]).then(function (results) {
      var fsProfiles = results[0];
      var dbProfiles = results[1];
      var merged = {};

      if (fsProfiles.success && Array.isArray(fsProfiles.data)) {
        fsProfiles.data.forEach(function (p) {
          var name = p && (p.group || p.profile);
          if (!name) return;
          if (!merged[name]) merged[name] = { profile: name, source: 'config', revision: null };
        });
      }

      if (dbProfiles.success && Array.isArray(dbProfiles.data)) {
        dbProfiles.data.forEach(function (p) {
          if (!p || !p.profile) return;
          if (!merged[p.profile]) merged[p.profile] = { profile: p.profile, source: 'db', revision: null };
          merged[p.profile].source = merged[p.profile].source === 'config' ? 'config+db' : 'db';
          merged[p.profile].revision = typeof p.revision === 'number' ? p.revision : merged[p.profile].revision;
        });
      }

      var names = Object.keys(merged).sort(function (a, b) {
        if (a === 'public') return -1;
        if (b === 'public') return 1;
        return a.localeCompare(b);
      });

      names.forEach(function (name) {
        var item = merged[name];
        var o = document.createElement('option');
        o.value = item.profile;
        if (item.source === 'config+db') {
          o.textContent = item.profile + ' (config + rev ' + (item.revision == null ? '0' : item.revision) + ')';
        } else if (item.source === 'db') {
          o.textContent = item.profile + ' (rev ' + (item.revision == null ? '0' : item.revision) + ')';
        } else {
          o.textContent = item.profile + ' (config)';
        }
        sel.appendChild(o);
      });
    }).catch(function () {
      setStatus('Groups konnten nicht geladen werden.', 'err');
    });
  }

  function loadCatalog(profile) {
    if (!profile) { setStatus('Bitte Group angeben.', 'err'); return; }
    setStatus('Lade Katalog…');
    api('tydac-load', { query: 'profile=' + encodeURIComponent(profile) }).then(function (j) {
      if (!j.success) { setStatus('Fehler: ' + (j.error || ''), 'err'); return; }
      _profile = profile;
      _doc = j.data.lyrmgr && Object.keys(j.data.lyrmgr).length ? j.data.lyrmgr : { main_lyrmgr: { type: 'ClassicLayerMgr', version: '3', structure: {} } };
      _revision = j.data.revision || 0;
      _site = j.data.site || '';
      $('siteInfo').textContent = 'Ziel: ' + _ctxRoot + ' · Site: ' + _site + ' · Variante: tydac' + (j.data.exists ? '' : ' · (neu)');
      $('btnSave').disabled = false;
      $('btnValidate').disabled = false;
      $('btnHistory').disabled = false;
      $('btnPreview').disabled = false;
      _selectedPath = null;
      renderTree();
      loadAvailableLayers(profile);
      $('propPane').innerHTML = '<div class="empty" style="padding:8px">Element im Baum wählen.</div>';
      setStatus('Geladen (rev ' + _revision + ').', 'ok');
      acquireLock(profile);
    }).catch(function (e) { setStatus('Fehler: ' + e.message, 'err'); });
  }

  function saveCatalog() {
    if (!_doc || !_profile) return;
    if (!showValidationResult(validateCatalog())) return;
    setStatus('Speichere & publiziere…');
    api('tydac-publish', { method: 'POST', body: { profile: _profile, lyrmgr: _doc, expectedRevision: _revision } })
      .then(function (j) {
        if (j.__status === 409 || (j.data && j.data.conflict)) {
          setStatus('Konflikt: Katalog wurde zwischenzeitlich geändert. Bitte neu laden.', 'err');
          return;
        }
        if (!j.success) { setStatus('Speicherfehler: ' + (j.error || ''), 'err'); return; }
        var d = j.data || {};
        _revision = (d.revision != null) ? d.revision : _revision;
        _dirty = false;
        var f = d.file || {};
        if (f.file) {
          setStatus('Gespeichert (rev ' + _revision + ') + lyrmgr.conf publiziert' + (f.backup ? ' (Backup: ' + f.backup + ')' : '') + '.', 'ok');
        } else {
          setStatus('Version gespeichert (rev ' + _revision + '), Datei-Publish fehlgeschlagen: ' + (f.error || 'unbekannt'), 'err');
        }
      }).catch(function (e) { setStatus('Speicherfehler: ' + e.message, 'err'); });
  }

  var _dirty = false;
  function markDirty() { _dirty = true; setStatus('Ungespeicherte Änderungen…'); }

  function acquireLock(profile) {
    api('tydac-lock', { query: 'profile=' + encodeURIComponent(profile) }).then(function (j) {
      if (j.success && j.data && j.data.locked === false && j.data.by) {
        setStatus('Hinweis: gesperrt von ' + j.data.by, 'err');
      }
    });
  }
  function releaseLock() {
    if (!_profile) return;
    try {
      navigator.sendBeacon && navigator.sendBeacon(getApiUrl() + '?action=tydac-unlock&ctx_root=' + encodeURIComponent(_ctxRoot) + '&profile=' + encodeURIComponent(_profile));
    } catch (e) {}
  }

  // =====================================================================
  // SPALTENBREITEN
  // =====================================================================
  var PANEL_WIDTHS_STORAGE_KEY = 'tnet-tydac-panel-widths';
  var MIN_TREE_WIDTH = 250;
  var MIN_PROP_WIDTH = 240;
  var MIN_PREVIEW_WIDTH = 240;

  function setPanelWidth(panel, width) {
    panel.style.width = width + 'px';
    panel.style.flexBasis = width + 'px';
  }

  function updatePreviewMapSize() {
    if (_previewMap) {
      window.requestAnimationFrame(function () { _previewMap.updateSize(); });
    }
  }

  function savePanelWidths() {
    try {
      localStorage.setItem(PANEL_WIDTHS_STORAGE_KEY, JSON.stringify({
        properties: Math.round($('propPanel').getBoundingClientRect().width),
        preview: Math.round($('previewPanel').getBoundingClientRect().width)
      }));
    } catch (e) {}
  }

  function restorePanelWidths() {
    try {
      var widths = JSON.parse(localStorage.getItem(PANEL_WIDTHS_STORAGE_KEY) || 'null');
      if (!widths) return;
      if (widths.properties >= MIN_PROP_WIDTH) setPanelWidth($('propPanel'), widths.properties);
      if (widths.preview >= MIN_PREVIEW_WIDTH) setPanelWidth($('previewPanel'), widths.preview);
    } catch (e) {}
  }

  function resizeTreeAndProperties(startPropWidth, delta) {
    var layout = document.querySelector('.layout');
    var availablePropWidth = layout.clientWidth - $('availPane').getBoundingClientRect().width -
      $('previewPanel').getBoundingClientRect().width - $('treePropResizer').offsetWidth -
      $('propPreviewResizer').offsetWidth - MIN_TREE_WIDTH;
    var maxPropWidth = Math.max(720, availablePropWidth);
    setPanelWidth($('propPanel'), Math.max(MIN_PROP_WIDTH, Math.min(maxPropWidth, startPropWidth - delta)));
    updatePreviewMapSize();
  }

  function resizePropertiesAndPreview(startPropWidth, startPreviewWidth, delta) {
    var minDelta = MIN_PROP_WIDTH - startPropWidth;
    var maxDelta = startPreviewWidth - MIN_PREVIEW_WIDTH;
    var boundedDelta = Math.max(minDelta, Math.min(maxDelta, delta));
    setPanelWidth($('propPanel'), startPropWidth + boundedDelta);
    setPanelWidth($('previewPanel'), startPreviewWidth - boundedDelta);
    updatePreviewMapSize();
  }

  function bindPanelResizer(resizer, mode) {
    function resizeFromKeyboard(delta) {
      var propWidth = $('propPanel').getBoundingClientRect().width;
      var previewWidth = $('previewPanel').getBoundingClientRect().width;
      if (mode === 'tree-prop') resizeTreeAndProperties(propWidth, delta);
      else resizePropertiesAndPreview(propWidth, previewWidth, delta);
      savePanelWidths();
    }

    resizer.addEventListener('keydown', function (event) {
      if (event.key === 'ArrowLeft') { event.preventDefault(); resizeFromKeyboard(-20); }
      if (event.key === 'ArrowRight') { event.preventDefault(); resizeFromKeyboard(20); }
    });
    resizer.addEventListener('pointerdown', function (event) {
      event.preventDefault();
      var startX = event.clientX;
      var startPropWidth = $('propPanel').getBoundingClientRect().width;
      var startPreviewWidth = $('previewPanel').getBoundingClientRect().width;
      resizer.classList.add('dragging');
      document.body.classList.add('panel-resizing');
      resizer.setPointerCapture(event.pointerId);

      function onPointerMove(moveEvent) {
        var delta = moveEvent.clientX - startX;
        if (mode === 'tree-prop') resizeTreeAndProperties(startPropWidth, delta);
        else resizePropertiesAndPreview(startPropWidth, startPreviewWidth, delta);
      }
      function finishResize() {
        resizer.classList.remove('dragging');
        document.body.classList.remove('panel-resizing');
        savePanelWidths();
        updatePreviewMapSize();
        resizer.removeEventListener('pointermove', onPointerMove);
        resizer.removeEventListener('pointerup', finishResize);
        resizer.removeEventListener('pointercancel', finishResize);
      }
      resizer.addEventListener('pointermove', onPointerMove);
      resizer.addEventListener('pointerup', finishResize);
      resizer.addEventListener('pointercancel', finishResize);
    });
  }

  function initPanelResizers() {
    restorePanelWidths();
    bindPanelResizer($('treePropResizer'), 'tree-prop');
    bindPanelResizer($('propPreviewResizer'), 'prop-preview');
  }

  function openHistory() {
    $('histModal').classList.add('open');
    $('histList').innerHTML = '<div class="empty">Lade…</div>';
    api('tydac-history', { query: 'profile=' + encodeURIComponent(_profile) }).then(function (j) {
      if (!j.success || !j.data.length) { $('histList').innerHTML = '<div class="empty">Kein Verlauf.</div>'; return; }
      var html = '<table style="width:100%;border-collapse:collapse;font-size:13px">';
      html += '<tr style="text-align:left;color:var(--muted)"><th>Rev</th><th>Aktion</th><th>Von</th><th>Zeit</th><th></th></tr>';
      j.data.forEach(function (h) {
        html += '<tr style="border-top:1px solid var(--border)"><td>' + h.revision + '</td><td>' + esc(h.action) +
          '</td><td>' + esc(h.changedBy || '') + '</td><td>' + esc(h.changedAt || '') +
          '</td><td><button class="btn-sm" data-rev="' + h.revision + '">Wiederherstellen</button></td></tr>';
      });
      html += '</table>';
      $('histList').innerHTML = html;
      Array.prototype.forEach.call($('histList').querySelectorAll('button[data-rev]'), function (b) {
        b.addEventListener('click', function () { restoreRevision(parseInt(b.getAttribute('data-rev'), 10)); });
      });
    });
  }
  function restoreRevision(rev) {
    if (!confirm('Revision ' + rev + ' wiederherstellen? Der aktuelle Stand wird als neue Revision überschrieben.')) return;
    api('tydac-restore', { method: 'POST', body: { profile: _profile, revision: rev } }).then(function (j) {
      if (!j.success) { setStatus('Restore-Fehler: ' + (j.error || ''), 'err'); return; }
      $('histModal').classList.remove('open');
      loadCatalog(_profile);
    });
  }

  // =====================================================================
  // INIT
  // =====================================================================
  $('btnLoad').addEventListener('click', function () {
    var p = $('profileManual').value.trim() || $('profileSelect').value;
    loadCatalog(p);
  });
  $('btnSave').addEventListener('click', saveCatalog);
  $('btnValidate').addEventListener('click', function () { showValidationResult(validateCatalog()); });
  $('btnHistory').addEventListener('click', openHistory);
  $('ctxRootSelect').addEventListener('change', function () {
    _ctxRoot = $('ctxRootSelect').value || APP_ROOT;
    _doc = null;
    _profile = '';
    _revision = 0;
    _selectedPath = null;
    $('treePane').innerHTML = '<div class="empty">Group auswählen und „Laden“ klicken.</div>';
    $('propPane').innerHTML = '<div class="empty" style="padding:8px">Kein Element ausgewählt.</div>';
    $('profileManual').value = '';
    $('btnSave').disabled = true;
    $('btnValidate').disabled = true;
    $('btnHistory').disabled = true;
    $('btnPreview').disabled = true;
    setStatus('Kontext gewechselt: ' + _ctxRoot + '.');
    loadProfiles();
    loadAvailableLayers(null);
    loadCategoryIconsData();
    loadLayerIconsData();
  });
  $('btnReloadLayers').addEventListener('click', function () { loadAvailableLayers(_profile || null); });
  $('btnAddLyrmgr').addEventListener('click', addLyrmgrSection);
  $('basemapSelect').addEventListener('change', function () {
    var val = this.value;
    if (!_previewMap) return;
    Object.keys(_previewBaseLayers).forEach(function (k) { _previewBaseLayers[k].setVisible(k === val); });
  });
  $('opacitySlider').addEventListener('input', function () {
    $('opacityVal').textContent = this.value + '%';
    var op = parseInt(this.value, 10) / 100;
    Object.keys(_previewBaseLayers).forEach(function (k) { _previewBaseLayers[k].setOpacity(op); });
  });
  $('btnPreview').addEventListener('click', openPreview);
  $('iconModalClose').addEventListener('click', function () { $('iconModal').classList.remove('open'); });
  $('histModalClose').addEventListener('click', function () { $('histModal').classList.remove('open'); });
  $('previewModalClose').addEventListener('click', function () { $('previewModal').classList.remove('open'); });
  Array.prototype.forEach.call(document.querySelectorAll('[data-preview-tab]'), function (btn) {
    btn.addEventListener('click', function () {
      _previewTab = btn.getAttribute('data-preview-tab');
      Array.prototype.forEach.call(document.querySelectorAll('[data-preview-tab]'), function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      renderPreview();
    });
  });
  $('layerSearch').addEventListener('input', renderLayerList);
  $('layerTagFilter').addEventListener('change', renderLayerList);
  $('btnVerifyAll').addEventListener('click', verifyAllSources);
  $('btnVerifyFilter').addEventListener('click', toggleVerifyFilter);
  $('iconSearch').addEventListener('input', function () { if (_symbolSets) renderIconGrid(); });
  $('iconUpload').addEventListener('change', function () { uploadIcon(this); });
  window.addEventListener('beforeunload', function (e) {
    releaseLock();
    if (_dirty) { e.preventDefault(); e.returnValue = ''; }
  });

  $('ctxRootSelect').value = APP_ROOT;
  _ctxRoot = $('ctxRootSelect').value || APP_ROOT;
  loadProfiles();
  loadAvailableLayers(null);
  loadCategoryIconsData();
  loadLayerIconsData();
  initPanelResizers();
  setStatus('Bereit (' + _ctxRoot + ').');
})();
</script>
</body>
</html>
