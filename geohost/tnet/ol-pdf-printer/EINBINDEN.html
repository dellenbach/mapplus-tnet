     In eurem Dojo-Code:  window._olMap = map;
     
     Euer "PDF erstellen" Button ruft auf:
     ============================================================ -->
<script>
function pdfErstellen() {
  var massstab        = parseInt(document.getElementById('massstab').value, 10);
  var layout          = document.getElementById('layout').value;
  var aufloesung      = document.querySelector('input[name="aufloesung"]:checked').value;
  var rotation        = parseFloat(document.getElementById('rotation').value) || 0;
  var kartentitel     = document.getElementById('kartentitel').value;
  var koordinatennetz = document.getElementById('koordinatennetz').checked;
  var netzfarbe       = document.querySelector('input[name="netzfarbe"]:checked');

  templatePdfPrint({
    massstab:        massstab,
    layout:          layout,
    aufloesung:      parseInt(aufloesung, 10),
    rotation:        rotation,
    kartentitel:     kartentitel,
    koordinatennetz: koordinatennetz,
    netzfarbe:       netzfarbe ? netzfarbe.value : 'schwarz',
    onProgress: function(step, msg) { console.log('PDF: ' + msg + ' (' + step + '/7)'); },
    onSuccess:  function() { alert('PDF erstellt!'); },
    onError:    function(err) { alert('Fehler: ' + err.message); }
  });
}
